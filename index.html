<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="theme-color" content="#1d2a2f" />
<title>Summer Co-Parenting Calendar</title>
<link rel="manifest" href="manifest.json" />
<link rel="icon" type="image/svg+xml" href="icon.svg" />
<link rel="apple-touch-icon" href="icon-192.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Newsreader:ital,opsz@0,6..72;1,6..72&display=swap" rel="stylesheet" />
<style>
  :root {
    --b: #1f6fb2;        /* Bobby — cerulean */
    --b-soft: #cfe4f4;
    --b-tint: #d4e6f5;
    --b-line: #9cc6e8;
    --a: #11a89b;        /* Allie — turquoise */
    --a-soft: #c4e8e1;
    --a-tint: #cfece5;
    --a-line: #8bd3c8;
    --ba: #6d3bd1;       /* both — purple */
    --ba-soft: #e0d0f7;
    --ba-tint: #d8c6f4;
    --ba-line: #b49de0;
    --tbd: #b08830;      /* TBD — amber */
    --tbd-soft: #f5ecd8;
    --tbd-tint: #f5ecd8;
    --tbd-line: #dbc89e;
    --ink: #1d2a2f;
    --purple: #6d3bd1;
    --purple-soft: #efe7fb;
    --muted: #6f8088;
    --paper: #f3f6f5;
    --card: #ffffff;
    --line: #dce6e5;
    --shadow: rgba(20,50,60,.14);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Newsreader', Georgia, serif;
    color: var(--ink);
    background:
      radial-gradient(1100px 520px at 85% -8%, #ffffff 0%, transparent 60%),
      radial-gradient(900px 500px at 5% 110%, #e4f0ee 0%, transparent 55%),
      var(--paper);
    background-attachment: fixed;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .wrap {
    width: min(94vw, 1400px);
    margin: 0 auto;
    padding: 30px clamp(14px, 3vw, 40px) 80px;
  }

  /* ---------- Header ---------- */
  header.top {
    border-bottom: 2px solid var(--ink);
    padding-bottom: 18px;
    margin-bottom: 22px;
  }
  .title {
    font-family: 'Fraunces', serif; font-weight: 600;
    font-size: clamp(28px, 6vw, 46px); line-height: 1; margin: 0;
    letter-spacing: -0.02em;
  }
  .subtitle { margin: 7px 0 0; color: var(--muted); font-style: italic; font-size: 15px; }

  .legend { display: flex; flex-wrap: wrap; gap: 9px; margin-top: 16px; align-items: center; }
  .chip {
    display: inline-flex; align-items: center; gap: 7px;
    font-family: 'Fraunces', serif; font-weight: 500; font-size: 13px;
    padding: 5px 11px; border-radius: 999px; border: 1px solid var(--line);
    background: var(--card); white-space: nowrap;
  }
  .chip i { width: 11px; height: 11px; border-radius: 3px; display: inline-block; }
  .sw-b { background: var(--b); }
  .sw-a { background: var(--a); }
  .sw-t { background: linear-gradient(135deg, var(--b) 0%, var(--b) 40%, var(--purple) 47%, var(--purple) 53%, var(--a) 60%, var(--a) 100%); }
  .sw-tbd { background: var(--tbd); }
  .sw-q { background: repeating-linear-gradient(45deg, #aeb8b8, #aeb8b8 2px, #d2dada 2px, #d2dada 4px); }

  /* ---------- Toolbar ---------- */
  .toolbar {
    display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
    margin: 18px 0 26px;
  }
  .btn {
    font-family: 'Fraunces', serif; font-weight: 600; font-size: 13.5px;
    padding: 8px 15px; border-radius: 9px; cursor: pointer;
    border: 1px solid var(--line); background: var(--card); color: var(--ink);
    transition: .15s; display: inline-flex; align-items: center; gap: 7px;
  }
  .btn:hover { border-color: var(--ink); transform: translateY(-1px); }
  .btn-primary { background: var(--ink); color: #fff; border-color: var(--ink); }
  .btn-primary:hover { background: #2c3f46; }
  .btn-ghost { background: transparent; color: var(--muted); }
  .btn-ghost:hover { color: var(--ink); }
  .spacer { flex: 1; }

  /* ---------- Month ---------- */
  .month { margin-bottom: 34px; }
  .month-name {
    font-family: 'Fraunces', serif; font-weight: 600; font-size: 21px;
    margin: 0 0 10px; letter-spacing: -0.01em;
  }
  .month-name span { color: var(--muted); font-weight: 500; }
  .dow {
    display: grid; grid-template-columns: repeat(7, 1fr);
    font-family: 'Fraunces', serif; font-size: 10.5px; letter-spacing: .08em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 6px;
  }
  .dow span { text-align: center; }
  .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 7px; }

  .cell {
    position: relative; min-height: 110px; border-radius: 9px;
    border: 1px solid var(--line); background: var(--card);
    padding: 7px 8px; font-size: 11.5px; line-height: 1.28;
    display: flex; flex-direction: column; overflow: hidden;
    transition: transform .12s ease, box-shadow .12s ease;
  }
  .cell.empty { border: none; background: transparent; min-height: 0; }
  .cell.out { opacity: .3; background: transparent; }
  .cell.past { min-height: 42px; opacity: .55; }
  .cell.past .note-text { display: none; }
  .cell.past .time { display: none; }
  .cell.past .note-dot { display: none; }
  .cell.past .resolve { display: none; }
  .cell.active { cursor: pointer; }
  .cell.active:hover { transform: translateY(-2px); box-shadow: 0 6px 16px var(--shadow); z-index: 2; }

  .cell-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 3px; position: relative; z-index: 2; }
  .daynum { font-family: 'Fraunces', serif; font-weight: 600; font-size: 14px; }
  .tag {
    font-family: 'Fraunces', serif; font-weight: 700; font-size: 9.5px;
    padding: 1px 6px; border-radius: 999px; letter-spacing: .03em;
  }
  .time { font-family: 'Fraunces', serif; font-weight: 600; font-size: 11.5px; margin-bottom: 2px; }
  .note-dot {
    position: absolute; right: 6px; bottom: 6px;
    width: 18px; height: 18px; border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    background: rgba(29,42,47,.07); color: var(--muted);
    pointer-events: none;
  }
  .note-dot svg { width: 11px; height: 11px; display: block; }
  .note-text {
    position: relative; z-index: 2; margin-top: auto;
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    font-size: 9.8px; line-height: 1.32; color: var(--ink); opacity: .72;
    padding-right: 20px;   /* clear the corner icon */
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .c-b .note-dot { background: rgba(31,111,178,.14); color: var(--b); }
  .c-a .note-dot { background: rgba(17,168,155,.16); color: var(--a); }
  .c-ba .note-dot { background: rgba(91,122,134,.16); color: var(--ba); }
  .c-trans .note-dot { background: rgba(109,59,209,.14); color: var(--purple); }

  .c-b { background: var(--b-tint); border-color: var(--b-line); }
  .c-b .tag { background: var(--b); color: #fff; } .c-b .time { color: var(--b); }
  .c-a { background: var(--a-tint); border-color: var(--a-line); }
  .c-a .tag { background: var(--a); color: #fff; } .c-a .time { color: var(--a); }
  .c-ba { background: var(--ba-tint); border-color: var(--ba-line); }
  .c-ba .tag { background: var(--ba); color: #fff; } .c-ba .time { color: var(--ba); }
  .c-tbd { background: var(--tbd-tint); border-color: var(--tbd-line); }
  .c-tbd .tag { background: var(--tbd); color: #fff; } .c-tbd .time { color: var(--tbd); }
  .c-tbd .note-dot { background: rgba(176,136,48,.14); color: var(--tbd); }
  .c-none { background: var(--card); }

  /* Real gradient transition day */
  .c-trans { border-color: #c3b0e8; }
  .c-trans .time { color: var(--ink); }
  .c-trans::after {
    content: ""; position: absolute; inset: 0; pointer-events: none; border-radius: inherit;
    background: linear-gradient(135deg, transparent calc(50% - 0.5px), var(--line) calc(50% - 0.5px), var(--line) calc(50% + 0.5px), transparent calc(50% + 0.5px));
  }
  .tag-trans {
    background: var(--purple) !important; color: #fff;
    border: 1px solid var(--purple); padding: 1px 6px;
    position: relative; z-index: 3;
  }

  /* Unresolved */
  .c-unres {
    filter: grayscale(.85) opacity(.72);
    background: #eef1f0 !important; border-color: #d3dcdb !important; border-style: dashed;
  }
  .c-unres .tag { background: #8f9a9a !important; color: #fff; }
  .c-unres .time { color: #5f6a6a !important; }
  .resolve {
    margin-top: 5px; align-self: flex-start;
    font-family: 'Fraunces', serif; font-weight: 600; font-size: 10px;
    letter-spacing: .03em; padding: 3px 9px; border-radius: 999px;
    border: 1px solid #a7b2b2; background: #fff; color: #54605f; cursor: pointer; transition: .15s;
  }
  .resolve:hover { background: var(--ink); color: #fff; border-color: var(--ink); }

  /* ---------- Changelog ---------- */
  .panel {
    background: var(--card); border: 1px solid var(--line); border-radius: 14px;
    padding: 20px 22px; margin-top: 30px;
  }
  .panel h2 {
    font-family: 'Fraunces', serif; font-weight: 600; font-size: 20px; margin: 0 0 4px;
  }
  .panel .panel-sub { color: var(--muted); font-style: italic; font-size: 13.5px; margin: 0 0 14px; }
  .log-item {
    display: flex; gap: 12px; padding: 10px 0; border-top: 1px solid var(--line);
    font-size: 13.5px;
  }
  .log-item:first-of-type { border-top: none; }
  .log-when {
    font-family: 'Fraunces', serif; font-weight: 600; font-size: 12px; color: var(--muted);
    white-space: nowrap; min-width: 92px;
  }
  .log-who {
    font-family: 'Fraunces', serif; font-weight: 600; font-size: 12.5px; color: var(--ink);
    white-space: nowrap; min-width: 70px;
  }
  .log-anon { color: var(--muted); font-style: italic; font-weight: 500; }
  .log-what { flex: 1; }
  .log-what b { font-weight: 600; }
  .log-empty { color: var(--muted); font-style: italic; font-size: 13.5px; }
  .signin-sub { margin: 4px 0 6px; color: var(--muted); font-style: italic; font-size: 13.5px; }
  .clearlog {
    margin-top: 12px; font-family: 'Fraunces', serif; font-size: 12px; color: var(--muted);
    background: none; border: none; cursor: pointer; text-decoration: underline; padding: 0;
  }
  .clearlog:hover { color: var(--ink); }

  .foot { margin: 28px auto 0; max-width: 600px; text-align: center; color: var(--muted); font-style: italic; font-size: 13.5px; line-height: 1.55; }

  /* ---------- Modal ---------- */
  .backdrop {
    position: fixed; inset: 0; background: rgba(20,35,40,.45); backdrop-filter: blur(3px);
    display: flex; align-items: center; justify-content: center; padding: 20px; z-index: 50;
    animation: fade .15s ease;
  }
  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: var(--card); border-radius: 16px; width: min(460px, 100%);
    padding: 26px 26px 22px; box-shadow: 0 24px 60px rgba(15,40,45,.32); border: 1px solid var(--line);
    animation: pop .18s ease;
  }
  @keyframes pop { from { transform: translateY(8px) scale(.98); opacity: 0; } to { transform: none; opacity: 1; } }
  .modal h3 { font-family: 'Fraunces', serif; font-weight: 600; font-size: 23px; margin: 0 0 16px; }
  .flabel {
    display: block; font-family: 'Fraunces', serif; font-size: 11.5px; letter-spacing: .05em;
    text-transform: uppercase; color: var(--muted); margin: 14px 0 7px;
  }
  .pick { display: flex; gap: 7px; flex-wrap: wrap; }
  .pp {
    font-family: 'Fraunces', serif; font-size: 14px; padding: 8px 15px; border-radius: 9px;
    border: 1px solid var(--line); background: #fff; cursor: pointer; transition: .14s; color: var(--ink);
  }
  .pp:hover { border-color: var(--ink); }
  .pp.on { background: var(--ink); color: #fff; border-color: var(--ink); }
  .pp.on.pb { background: var(--b); border-color: var(--b); }
  .pp.on.pa { background: var(--a); border-color: var(--a); }
  .pp.on.pba { background: var(--ba); border-color: var(--ba); }
  .pp.on.ptbd { background: var(--tbd); border-color: var(--tbd); }
  .inp, .ta {
    width: 100%; font-family: 'Newsreader', serif; font-size: 15px; padding: 10px 12px;
    border-radius: 9px; border: 1px solid var(--line); background: var(--paper); color: var(--ink); resize: vertical;
  }
  .inp:focus, .ta:focus { outline: 2px solid var(--b); border-color: var(--b); }
  .checkrow { display: flex; align-items: center; gap: 9px; margin-top: 16px; font-size: 14px; cursor: pointer; }
  .checkrow input { width: 16px; height: 16px; accent-color: var(--b); }
  .modal-actions { display: flex; align-items: center; margin-top: 24px; gap: 10px; }
  .modal-actions .right { display: flex; gap: 10px; margin-left: auto; }
  .btn-del { background: transparent; color: var(--a); border-color: var(--a-line); }
  .btn-del:hover { background: var(--a); color: #fff; }
  .auth-err { color: #c0392b; font-size: 13px; margin: 8px 0 0; }
  .auth-tabs { display: flex; gap: 0; margin-bottom: 18px; border-bottom: 2px solid var(--line); }
  .auth-tab {
    flex: 1; text-align: center; padding: 10px 0; cursor: pointer;
    font-family: 'Fraunces', serif; font-weight: 600; font-size: 14px;
    color: var(--muted); border-bottom: 2px solid transparent; margin-bottom: -2px;
    transition: .15s; background: none; border-top: none; border-left: none; border-right: none;
  }
  .auth-tab:hover { color: var(--ink); }
  .auth-tab.on { color: var(--ink); border-bottom-color: var(--ink); }
  .auth-loading { text-align: center; padding: 60px 20px; font-family: 'Fraunces', serif; font-size: 16px; color: var(--muted); }
  .user-pill {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: 'Fraunces', serif; font-size: 13px; font-weight: 500;
    max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  /* ---------- Highlight my days ---------- */
  body.highlight-b .cell.c-a:not(.past):not(.c-trans) { opacity: .38; filter: saturate(.3); }
  body.highlight-b .cell.c-a.past:not(.c-trans) { opacity: .25; }
  body.highlight-a .cell.c-b:not(.past):not(.c-trans) { opacity: .38; filter: saturate(.3); }
  body.highlight-a .cell.c-b.past:not(.c-trans) { opacity: .25; }
  .btn-highlight { gap: 5px; }
  .btn-highlight.on { background: var(--ink); color: #fff; border-color: var(--ink); }
  .btn-highlight .hl-dot {
    width: 8px; height: 8px; border-radius: 50%; display: inline-block;
  }

  /* ---------- Main layout (calendar + sidebar) ---------- */
  .main-layout {
    display: grid; grid-template-columns: 1fr 280px; gap: 28px; align-items: start;
  }
  .sidebar {
    position: sticky; top: 24px;
  }
  .sidebar-panel {
    background: var(--card); border: 1px solid var(--line); border-radius: 14px;
    padding: 18px 20px;
  }
  .sidebar-panel h3 {
    font-family: 'Fraunces', serif; font-weight: 600; font-size: 16px; margin: 0 0 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .sidebar-panel h3 .badge {
    font-size: 10px; font-weight: 700; background: var(--tbd); color: #fff;
    padding: 2px 6px; border-radius: 999px; min-width: 18px; text-align: center;
  }
  .sidebar-item {
    display: flex; flex-direction: column; gap: 2px; padding: 8px 0;
    border-bottom: 1px solid var(--line); cursor: pointer; transition: .1s;
    font-size: 13px;
  }
  .sidebar-item:last-child { border-bottom: none; }
  .sidebar-item:hover { color: var(--b); }
  .sidebar-item-date {
    font-family: 'Fraunces', serif; font-weight: 600; font-size: 12px; color: var(--ink);
  }
  .sidebar-item-detail { color: var(--muted); font-size: 12px; }
  .sidebar-item-assignee {
    font-family: 'Fraunces', serif; font-size: 10px; font-weight: 600;
    color: var(--tbd); margin-top: 1px;
  }
  .sidebar-empty { color: var(--muted); font-style: italic; font-size: 13px; padding: 4px 0; }

  @media (max-width: 900px) {
    .main-layout { grid-template-columns: 1fr; }
    .sidebar { position: static; }
  }

  /* ---------- Activity Panel ---------- */
  .activity {
    background: var(--card); border: 1px solid var(--line); border-radius: 14px;
    padding: 18px 20px; margin-bottom: 28px;
  }
  .activity h2 {
    font-family: 'Fraunces', serif; font-weight: 600; font-size: 18px; margin: 0 0 14px;
    display: flex; align-items: center; gap: 8px;
  }
  .activity h2 .badge {
    font-size: 11px; font-weight: 700; background: #c0392b; color: #fff;
    padding: 2px 7px; border-radius: 999px; min-width: 20px; text-align: center;
  }
  .act-section { margin-bottom: 16px; }
  .act-section:last-child { margin-bottom: 0; }
  .act-heading {
    font-family: 'Fraunces', serif; font-weight: 600; font-size: 12px;
    text-transform: uppercase; letter-spacing: .06em; color: var(--muted);
    margin: 0 0 8px; display: flex; align-items: center; gap: 6px;
  }
  .act-heading .dot {
    width: 7px; height: 7px; border-radius: 50%; display: inline-block;
  }
  .act-item {
    display: flex; align-items: baseline; gap: 10px; padding: 6px 0;
    font-size: 13px; border-bottom: 1px solid var(--line); cursor: pointer;
    transition: .1s;
  }
  .act-item:last-child { border-bottom: none; }
  .act-item:hover { color: var(--b); }
  .act-date {
    font-family: 'Fraunces', serif; font-weight: 600; font-size: 12px;
    color: var(--ink); white-space: nowrap; min-width: 70px;
  }
  .act-detail { flex: 1; color: var(--ink); }
  .act-detail .act-who { font-weight: 600; }
  .act-meta { color: var(--muted); font-size: 11.5px; white-space: nowrap; }
  .act-none { color: var(--muted); font-style: italic; font-size: 13px; padding: 2px 0; }
  .assignee-tag {
    font-family: 'Fraunces', serif; font-size: 9px; font-weight: 600;
    padding: 1px 5px; border-radius: 999px;
    background: rgba(176,136,48,.18); color: var(--tbd);
    position: relative; z-index: 2;
  }

  /* ---------- Chat ---------- */
  .chat-section {
    margin-top: 20px; border-top: 1px solid var(--line); padding-top: 14px;
  }
  .chat-label {
    font-family: 'Fraunces', serif; font-size: 11.5px; letter-spacing: .05em;
    text-transform: uppercase; color: var(--muted); margin: 0 0 10px;
  }
  .chat-messages {
    max-height: 220px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px;
    margin-bottom: 10px; padding-right: 4px;
  }
  .chat-empty { color: var(--muted); font-style: italic; font-size: 13px; }
  .chat-msg {
    display: flex; flex-direction: column; gap: 2px;
    padding: 8px 10px; border-radius: 9px; background: var(--paper);
    font-size: 13.5px; line-height: 1.4;
  }
  .chat-msg-head {
    display: flex; align-items: baseline; gap: 8px;
  }
  .chat-msg-who {
    font-family: 'Fraunces', serif; font-weight: 600; font-size: 12px; color: var(--ink);
  }
  .chat-msg-when {
    font-family: 'Fraunces', serif; font-size: 10.5px; color: var(--muted);
  }
  .chat-msg-text { color: var(--ink); }
  .chat-input-row {
    display: flex; gap: 6px; align-items: flex-end;
  }
  .chat-input-row .inp { flex: 1; font-size: 13.5px; padding: 8px 10px; }
  .chat-send {
    font-family: 'Fraunces', serif; font-weight: 600; font-size: 13px;
    padding: 8px 14px; border-radius: 9px; border: none;
    background: var(--ink); color: #fff; cursor: pointer; transition: .15s;
    white-space: nowrap;
  }
  .chat-send:hover { background: #2c3f46; }
  .chat-send:disabled { opacity: .4; cursor: default; }

  /* ---------- Mobile: tablets ---------- */
  @media (max-width: 768px) {
    .wrap { padding: 20px clamp(8px, 2vw, 20px) 60px; }
    .title { font-size: clamp(24px, 5.5vw, 36px); }
    .grid { gap: 4px; }
    .cell { min-height: 88px; padding: 5px 6px; border-radius: 7px; }
    .daynum { font-size: 13px; }
    .tag { font-size: 8.5px; padding: 1px 5px; }
    .time { font-size: 10.5px; }
    .note-text { font-size: 9px; -webkit-line-clamp: 2; }
    .note-dot { width: 15px; height: 15px; right: 4px; bottom: 4px; }
    .note-dot svg { width: 9px; height: 9px; }
    .toolbar { gap: 6px; }
    .btn { font-size: 12.5px; padding: 7px 12px; }
    .log-item { font-size: 12.5px; gap: 8px; }
    .panel { padding: 16px; }
  }

  /* ---------- Mobile: phones ---------- */
  @media (max-width: 480px) {

async function refreshToken() {

  try {

      method: "POST",

      body: JSON.stringify({ refresh_token: stored.refresh_token })
    });
    if (!res.ok) { saveSession(null); return false; }
    const session = await res.json();
    setAuthFrom(session);
    return true;
  } catch(e) { return false; }
}

async function signUp(email, password, displayName) {

  if (body.access_token) {

// ---- Supabase Realtime (live sync between devices) ----
function startRealtime() {
  const wsUrl = SB_URL.replace("https://", "wss://") + "/realtime/v1/websocket?apikey=" + SB_KEY + "&vsn=1.0.0";
  let ws, heartbeat;

  function connect() {
    ws = new WebSocket(wsUrl);
    ws.onopen = () => {
      ws.send(JSON.stringify({ topic: "realtime:public:cocal", event: "phx_join", payload: { config: { postgres_changes: [{ event: "UPDATE", schema: "public", table: "cocal" }] } }, ref: "1" }));
      heartbeat = setInterval(() => {
        ws.send(JSON.stringify({ topic: "phoenix", event: "heartbeat", payload: {}, ref: "hb" }));
      }, 30000);
    };
    ws.onmessage = (ev) => {
      try {
        const msg = JSON.parse(ev.data);
        if (msg.event === "postgres_changes" && msg.payload?.data?.record) {
          const rec = msg.payload.data.record;
          if (rec.data && typeof rec.data === "object") {
            // Only apply if it's actually different (avoid echo from our own save)
            if (JSON.stringify(rec.data) !== JSON.stringify(data)) {
              data = rec.data;
              if (rec.log) log = rec.log;
              render();
            }
          }
        }
      } catch(e) {}
    };
    ws.onclose = () => { clearInterval(heartbeat); setTimeout(connect, 3000); };
    ws.onerror = () => { ws.close(); };
  }
  connect();
}

// ---------- Date helpers ----------
function ymd(y,m,d){ return y+"-"+String(m+1).padStart(2,"0")+"-"+String(d).padStart(2,"0"); }
function inRange(k){ return k >= RANGE_START && k <= RANGE_END; }
function prettyDate(k){
  const d = new Date(k+"T00:00:00");
  return d.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});
}
function shortDate(k){
  const d = new Date(k+"T00:00:00");
  return d.toLocaleDateString("en-US",{month:"short",day:"numeric"});
}
function prettyTs(ts){
  return new Date(ts).toLocaleDateString("en-US",{month:"short",day:"numeric"}) + ", " +
         new Date(ts).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"});
}

// ---------- Transition detection ----------
function computeTransitions(){
  const map = {};
  let prev = null;
  let w = new Date(RANGE_START+"T00:00:00");
  const end = new Date(RANGE_END+"T00:00:00");
  while (w <= end) {
    const k = ymd(w.getFullYear(), w.getMonth(), w.getDate());
    const e = data[k];
    const cur = (e && e.parent) || null;
    if (cur) {
      if (prev && prev !== cur && !(e && e.unresolved)) map[k] = { from: prev, to: cur };
      prev = cur;
    }
    w.setDate(w.getDate()+1);
  }
  return map;
}

function findNextParent(k) {
  const d = new Date(k + "T00:00:00");
  const end = new Date(RANGE_END + "T00:00:00");
  d.setDate(d.getDate() + 1);
  while (d <= end) {
    const key = ymd(d.getFullYear(), d.getMonth(), d.getDate());
    const entry = data[key];
    if (entry && entry.parent && entry.parent !== "BA" && entry.parent !== "TBD") return entry.parent;
    d.setDate(d.getDate() + 1);
  }
  return null;
}

// ---------- ICS export ----------
function pad(n){ return String(n).padStart(2,"0"); }
function icsDate(k){ return k.replace(/-/g,""); }          // all-day: YYYYMMDD
function nextDay(k){
  const d = new Date(k+"T00:00:00"); d.setDate(d.getDate()+1);
  return ymd(d.getFullYear(), d.getMonth(), d.getDate());
}
function icsEscape(s){ return (s||"").replace(/\\/g,"\\\\").replace(/;/g,"\\;").replace(/,/g,"\\,").replace(/\n/g,"\\n"); }

function buildICS(){
  const now = new Date();
  const stamp = now.getUTCFullYear()+pad(now.getUTCMonth()+1)+pad(now.getUTCDate())+"T"+
                pad(now.getUTCHours())+pad(now.getUTCMinutes())+pad(now.getUTCSeconds())+"Z";
  const lines = [
    "BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//Coparenting//Summer 2026//EN",
    "CALSCALE:GREGORIAN","METHOD:PUBLISH","X-WR-CALNAME:Summer Co-Parenting 2026"
  ];
  Object.keys(data).sort().forEach(k => {
    if (!inRange(k)) return;
    const e = data[k];
    if (!e || (!e.parent && !e.notes && !e.time)) return;
    const who = e.parent ? (PMETA[e.parent]?.label || e.parent) : "Unassigned";
    let title = who;
    if (e.time) title += " · " + e.time;
    if (e.unresolved) title = "(?) " + title;
    const descParts = [];
    if (e.time) descParts.push("Pickup/dropoff: " + e.time);
    if (e.notes) descParts.push(e.notes);
    if (e.unresolved) descParts.push("[Unresolved — plan not yet set]");
    lines.push(
      "BEGIN:VEVENT",
      "UID:" + k + "-coparent@summer2026",
      "DTSTAMP:" + stamp,
      "DTSTART;VALUE=DATE:" + icsDate(k),
      "DTEND;VALUE=DATE:" + icsDate(nextDay(k)),
      "SUMMARY:" + icsEscape(title),
      "DESCRIPTION:" + icsEscape(descParts.join("\n")),
      "TRANSP:TRANSPARENT",
      "END:VEVENT"
    );
  });
  lines.push("END:VCALENDAR");
  // ICS spec wants CRLF line endings
  return lines.join("\r\n");
}

function downloadICS(){
  const blob = new Blob([buildICS()], { type: "text/calendar;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "summer-coparenting-2026.ics";
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 1500);
  addLog("Exported calendar (.ics) file."); render();
}

// ---------- Mutations ----------
function openEditor(k){ editingKey = k; render(); }
function closeEditor(){ editingKey = null; render(); }

function describeEntry(e){
  if (!e || (!e.parent && !e.notes && !e.time)) return "empty";
  const who = e.parent ? (PMETA[e.parent]?.label || e.parent) : "unassigned";
  return who + (e.time ? " ("+e.time+")" : "") + (e.unresolved ? " [unresolved]" : "");
}

function saveEntry(k, draft){
  const before = data[k];
  const cleaned = { parent: draft.parent || null, notes: (draft.notes||"").trim(), time: (draft.time||"").trim() };
  if (draft.unresolved) cleaned.unresolved = true;
  if (draft.assignee && draft.assignee.trim()) cleaned.assignee = draft.assignee.trim();
  let changed = false, summary = "";
  if (!cleaned.parent && !cleaned.notes && !cleaned.time) {
    if (before) { delete data[k]; changed = true; summary = "Cleared " + shortDate(k) + " (was " + describeEntry(before) + ")."; }
  } else {
    const beforeDesc = describeEntry(before);
    const afterDesc  = describeEntry(cleaned);
    if (JSON.stringify(before||{}) !== JSON.stringify(cleaned)) {
      data[k] = cleaned; changed = true;
      summary = (before ? "Updated " : "Added ") + shortDate(k) + ": " + beforeDesc + (before ? " → " : "") + (before ? afterDesc : afterDesc) + ".";
      if (!before) summary = "Added " + shortDate(k) + ": " + afterDesc + ".";
    }
  }
  if (changed) { saveData(); addLog(summary); }
  editingKey = null; render();
}

function deleteEntry(k){
  const before = data[k];
  if (before) { delete data[k]; saveData(); addLog("Removed entry for " + shortDate(k) + " (was " + describeEntry(before) + ")."); }
  editingKey = null; render();
}

function resolveEntry(k){
  const e = data[k];
  if (e && e.unresolved) { delete e.unresolved; saveData(); addLog("Resolved " + shortDate(k) + " — set as " + describeEntry(e) + "."); render(); }
}

function resetAll(){
  if (!confirm("Reset the whole calendar back to the original schedule? Your edits and changelog will be lost.")) return;
  data = structuredClone(SEED);
  log = [{ ts: Date.now(), text: "Calendar reset to the original summer schedule." }];
  saveData(); saveLog(); render();
}

function clearLog(){
  if (!confirm("Clear the changelog? (Your schedule stays untouched.)")) return;
  log = [{ ts: Date.now(), text: "Changelog cleared." }];
  saveLog(); render();
}

// ---------- Render ----------
function el(html){ const t = document.createElement("template"); t.innerHTML = html.trim(); return t.content.firstChild; }

function render(){
  const root = document.getElementById("root");
  const mp = myParentCode();
  document.body.classList.remove("highlight-b", "highlight-a");
  if (highlightMine && mp) document.body.classList.add("highlight-" + mp.toLowerCase());
  const trans = computeTransitions();

  let b=0,a=0,ba=0,tbd=0,q=0;
  Object.entries(data).forEach(([k,v])=>{ if(!inRange(k))return; if(v.unresolved)q++; if(v.parent==="B")b++; else if(v.parent==="A")a++; else if(v.parent==="BA")ba++; else if(v.parent==="TBD")tbd++; });
  const tCount = Object.keys(trans).length;

  root.innerHTML = `
    <header class="top">
      <h1 class="title">Summer Co-Parenting</h1>
      <p class="subtitle">Memorial Day → Labor Day 2026 · pickups, dropoffs &amp; handoffs</p>
      <div class="legend">
        <span class="chip"><i class="sw-b"></i> Bobby · ${b}</span>
        <span class="chip"><i class="sw-a"></i> Allie · ${a}</span>
        ${ba?`<span class="chip"><i class="sw-a" style="background:var(--ba)"></i> Both · ${ba}</span>`:""}
        ${tbd?`<span class="chip"><i class="sw-tbd"></i> TBD · ${tbd}</span>`:""}
        ${tCount?`<span class="chip"><i class="sw-t"></i> Transition · ${tCount}</span>`:""}
        ${q?`<span class="chip"><i class="sw-q"></i> Unresolved · ${q}</span>`:""}
      </div>
    </header>

    <div class="toolbar">
      <button class="btn btn-primary" id="ics">⤓ Add to calendar (.ics)</button>
      <button class="btn" id="viewer">${authUser ? `<span class="user-pill">👤 ${escapeHtml(viewer)}</span>` : "Sign in"}</button>
      ${mp ? `<button class="btn btn-highlight ${highlightMine?"on":""}" id="hl-toggle"><span class="hl-dot" style="background:var(--${mp.toLowerCase()})"></span>${highlightMine ? "My days" : "Highlight mine"}</button>` : ""}
      <span class="spacer"></span>
      <button class="btn btn-ghost" id="reset" title="Reset to original schedule">Reset</button>
    </div>

    <div id="activity"></div>
    <div class="main-layout">
      <div id="months"></div>
      <aside class="sidebar" id="sidebar"></aside>
    </div>

    <p class="foot">
      Tap any day to edit, add a pickup/dropoff time, or remove it. Gradient days are transitions — the kids change
      houses, blending from one parent's color into the other. The corner icon and preview text show a day's note — tap to read the full thing.
      Faded days are unresolved; hit Resolve once a plan is set. Everything saves automatically in this browser, and
      each change is logged below.
    </p>

    <section class="panel">
      <h2>Changelog</h2>
      <p class="panel-sub">A running record of schedule changes, newest first.</p>
      <div id="log"></div>
      <button class="clearlog" id="clearlog">Clear changelog</button>
    </section>
  `;

  // Months
  const monthsWrap = root.querySelector("#months");
  MONTHS.forEach(({y,m}) => {
    const firstDow = new Date(y,m,1).getDay();
    const dim = new Date(y,m+1,0).getDate();
    const anyIn = Array.from({length:dim},(_,i)=>ymd(y,m,i+1)).some(inRange);
    if (!anyIn) return;

    const sec = el(`<section class="month"></section>`);
    sec.appendChild(el(`<h2 class="month-name">${MONTH_NAMES[m]} <span>${y}</span></h2>`));
    sec.appendChild(el(`<div class="dow">${DOW.map(d=>`<span>${d}</span>`).join("")}</div>`));
    const grid = el(`<div class="grid"></div>`);

    const cells = [];
    for (let i=0;i<firstDow;i++) cells.push(null);
    for (let d=1; d<=dim; d++) cells.push(d);
    while (cells.length % 7 !== 0) cells.push(null);

    cells.forEach(d => {
      if (d === null){ grid.appendChild(el(`<div class="cell empty"></div>`)); return; }
      const k = ymd(y,m,d);
      const active = inRange(k);
      const e = data[k];
      const t = trans[k];
      const unres = e && e.unresolved;
      // If coming FROM a Both/TBD day, suppress transition — that day already shows the full chain
      const isTrans = !!t && !unres && t.from !== "BA" && t.from !== "TBD";
      // Gradient only for direct B↔A transitions
      const showGradient = isTrans && t.to !== "BA" && t.to !== "TBD";

      const isPast = k < TODAY;
      const pcls = e&&e.parent==="B"?"c-b":e&&e.parent==="A"?"c-a":e&&e.parent==="BA"?"c-ba":e&&e.parent==="TBD"?"c-tbd":"c-none";
      const cls = ["cell", active?"active":"out", pcls, unres?"c-unres":"", showGradient?"c-trans":"", isPast?"past":""].join(" ");

      const cell = el(`<div class="${cls}" tabindex="${active?0:-1}"></div>`);

      if (showGradient) {
        const dimOther = highlightMine && mp;
        const gCol = p => {
          const isOther = dimOther && p !== mp;
          if (p==="B") return isOther ? "#eef1f0" : "rgba(31,111,178,.22)";
          if (p==="A") return isOther ? "#eef1f0" : "rgba(17,168,155,.22)";
          if (p==="TBD") return "rgba(176,136,48,.15)";
          return "rgba(109,59,209,.15)";
        };
        cell.style.background =
          `linear-gradient(135deg, ${gCol(t.from)} 0%, ${gCol(t.from)} 38%, ${gCol(t.to)} 62%, ${gCol(t.to)} 100%)`;
      }

      let tagHtml;
      if (isTrans && (e.parent === "BA" || e.parent === "TBD")) {
        // Both/TBD day: show full chain if parents differ on each side, otherwise just the label
        const nextP = findNextParent(k);
        if (nextP && nextP !== t.from) {
          tagHtml = `<span class="tag tag-trans">${PMETA[t.from]?.short}→${PMETA[e.parent]?.short}→${PMETA[nextP]?.short}</span>`;
        } else {
          tagHtml = `<span class="tag">${PMETA[e.parent]?.short}</span>`;
        }
      } else if (isTrans) {
        tagHtml = `<span class="tag tag-trans">${PMETA[t.from]?.short}→${PMETA[t.to]?.short}</span>`;
      } else {
        tagHtml = (e&&e.parent ? `<span class="tag">${PMETA[e.parent]?.short}</span>` : "");
      }

      cell.appendChild(el(`<div class="cell-top"><span class="daynum">${d}</span>${tagHtml}</div>`));
      if (e&&e.time && !isPast) cell.appendChild(el(`<div class="time">${escapeHtml(e.time)}</div>`));
      if (e&&e.assignee && !isPast) cell.appendChild(el(`<span class="assignee-tag">→ ${escapeHtml(e.assignee)}</span>`));
      if (e&&e.notes && e.notes.trim()) {
        const full = e.notes.trim();
        const nd = el(`<span class="note-dot"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4 3.5h16a.5.5 0 0 1 .5.5v10.6a.5.5 0 0 1-.146.353l-5.4 5.4a.5.5 0 0 1-.354.147H4a.5.5 0 0 1-.5-.5V4a.5.5 0 0 1 .5-.5Z" fill="currentColor" fill-opacity="0.9"/><path d="M14 20.5V15a.5.5 0 0 1 .5-.5h5.5" stroke="#ffffff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></span>`);
        nd.setAttribute("title", full);
        if (!unres) {
          const nt = el(`<div class="note-text">${escapeHtml(full)}</div>`);
          nt.setAttribute("title", full);
          cell.appendChild(nt);
        }
        cell.appendChild(nd);
      }
      if (unres) {
        const rb = el(`<button class="resolve">Resolve</button>`);
        rb.addEventListener("click", ev => { ev.stopPropagation(); resolveEntry(k); });
        cell.appendChild(rb);
      }
      if (active) cell.addEventListener("click", ()=>openEditor(k));
      grid.appendChild(cell);
    });

    sec.appendChild(grid);
    monthsWrap.appendChild(sec);
  });

  // Activity panel (unseen chats + recent changes — NOT unresolved dates)
  const actWrap = root.querySelector("#activity");
  const unresolvedDates = Object.entries(data)
    .filter(([k,v]) => inRange(k) && v.unresolved && k >= TODAY)
    .sort(([a],[b]) => a.localeCompare(b));
  const recentChanges = log
    .filter(item => item.who && item.who !== viewer)
    .slice(0, 5);
  // Group unseen chats by date
  const unseenByDate = {};
  unseenChats.forEach(m => {
    if (!unseenByDate[m.date_key]) unseenByDate[m.date_key] = [];
    unseenByDate[m.date_key].push(m);
  });
  const unseenDateKeys = Object.keys(unseenByDate).sort();

  const activityItems = unseenDateKeys.length + recentChanges.length;
  if (activityItems > 0) {
    const panel = el(`<div class="activity"></div>`);
    panel.appendChild(el(`<h2>Activity <span class="badge">${activityItems}</span></h2>`));

    // Unseen chats
    if (unseenDateKeys.length) {
      const sec = el(`<div class="act-section"></div>`);
      sec.appendChild(el(`<p class="act-heading"><span class="dot" style="background:#c0392b"></span> New messages</p>`));
      unseenDateKeys.forEach(dk => {
        const msgs = unseenByDate[dk];
        const last = msgs[0];
        const item = el(`<div class="act-item"><span class="act-date">${shortDate(dk)}</span><span class="act-detail"><span class="act-who">${escapeHtml(last.user_name)}</span>: ${escapeHtml(last.message.slice(0,60))}${last.message.length>60?"…":""}</span><span class="act-meta">${msgs.length > 1 ? msgs.length + " msgs" : "1 msg"}</span></div>`);
        item.addEventListener("click", () => openEditor(dk));
        sec.appendChild(item);
      });
      panel.appendChild(sec);
    }

    // Recent changes by other user
    if (recentChanges.length) {
      const sec = el(`<div class="act-section"></div>`);
      sec.appendChild(el(`<p class="act-heading"><span class="dot" style="background:var(--b)"></span> Recent changes by others</p>`));
      recentChanges.forEach(item => {
        sec.appendChild(el(`<div class="act-item" style="cursor:default"><span class="act-date">${prettyTs(item.ts).split(",")[0]}</span><span class="act-detail"><span class="act-who">${escapeHtml(item.who)}</span>: ${escapeHtml(item.text.slice(0,80))}</span></div>`));
      });
      panel.appendChild(sec);
    }

    actWrap.appendChild(panel);
  }

  // Right sidebar — unresolved dates
  const sidebarWrap = root.querySelector("#sidebar");
  const sidePanel = el(`<div class="sidebar-panel"></div>`);
  sidePanel.appendChild(el(`<h3>Unresolved ${unresolvedDates.length ? `<span class="badge">${unresolvedDates.length}</span>` : ""}</h3>`));
  if (unresolvedDates.length) {
    unresolvedDates.forEach(([dk, v]) => {
      const who = v.parent ? (PMETA[v.parent]?.label || v.parent) : "Unassigned";
      const item = el(`<div class="sidebar-item"></div>`);
      item.appendChild(el(`<span class="sidebar-item-date">${shortDate(dk)} · ${who}</span>`));
      if (v.notes && v.notes.trim()) {
        const preview = v.notes.trim().length > 50 ? v.notes.trim().slice(0,50) + "…" : v.notes.trim();
        item.appendChild(el(`<span class="sidebar-item-detail">${escapeHtml(preview)}</span>`));
      }
      if (v.assignee) item.appendChild(el(`<span class="sidebar-item-assignee">→ ${escapeHtml(v.assignee)}</span>`));
      item.addEventListener("click", () => openEditor(dk));
      sidePanel.appendChild(item);
    });
  } else {
    sidePanel.appendChild(el(`<span class="sidebar-empty">All dates resolved ✓</span>`));
  }
  sidebarWrap.appendChild(sidePanel);

  // Changelog
  const logWrap = root.querySelector("#log");
  if (!log.length) {
    logWrap.appendChild(el(`<p class="log-empty">No changes yet.</p>`));
  } else {
    log.forEach(item => {
      const whoLabel = item.who ? escapeHtml(item.who) : "<span class='log-anon'>(before sign-in)</span>";
      logWrap.appendChild(el(
        `<div class="log-item"><span class="log-when">${prettyTs(item.ts)}</span><span class="log-who">${whoLabel}</span><span class="log-what">${escapeHtml(item.text)}</span></div>`
      ));
    });
  }

  // Wire toolbar
  root.querySelector("#ics").addEventListener("click", downloadICS);
  root.querySelector("#reset").addEventListener("click", resetAll);
  root.querySelector("#viewer").addEventListener("click", () => { signingIn = true; render(); });
  const hlBtn = root.querySelector("#hl-toggle");
  if (hlBtn) hlBtn.addEventListener("click", toggleHighlight);
  root.querySelector("#clearlog").addEventListener("click", clearLog);

  if (signingIn) renderSignIn();
  if (editingKey) renderEditor(editingKey);
}

function escapeHtml(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function renderSignIn(){
  if (document.querySelector(".backdrop")) return;
  const isLoggedIn = !!authUser;
  let isSignUp = false;

  function buildModal() {
    return isLoggedIn ? `
      <div class="modal">
        <h3>Account</h3>
        <p class="signin-sub">Signed in as <b>${escapeHtml(authUser.email)}</b></p>
        <div class="modal-actions">
          <button class="btn btn-del" id="auth-logout">Sign out</button>
          <div class="right"><button class="btn btn-ghost" id="auth-cancel">Close</button></div>
        </div>
      </div>
    ` : `
      <div class="modal">
        <div class="auth-tabs">
          <button class="auth-tab ${isSignUp ? "" : "on"}" id="tab-signin">Sign in</button>
          <button class="auth-tab ${isSignUp ? "on" : ""}" id="tab-signup">Create account</button>
        </div>
        ${isSignUp ? `
          <label class="flabel">Display name</label>
          <input class="inp" id="auth-name" placeholder="e.g. Bobby, Allie, Grandma" autocomplete="name" />
        ` : ""}
        <label class="flabel">Email</label>
        <input class="inp" id="auth-email" type="email" placeholder="you@example.com" autocomplete="email" />
        <label class="flabel">Password</label>
        <input class="inp" id="auth-pass" type="password" placeholder="${isSignUp ? "Choose a password (6+ chars)" : "Your password"}" autocomplete="${isSignUp ? "new-password" : "current-password"}" />
        <div id="auth-err"></div>
        <div class="modal-actions">
          <div class="right" style="margin-left:0;width:100%;">
            <button class="btn btn-primary" id="auth-submit" style="width:100%;justify-content:center;">${isSignUp ? "Create account" : "Sign in"}</button>
          </div>
        </div>
      </div>
    `;
  }

  const backdrop = el(`<div class="backdrop"></div>`);
  function mount() {
    const existing = backdrop.querySelector(".modal");
    if (existing) existing.remove();
    const modal = el(buildModal());
    backdrop.appendChild(modal);

    if (isLoggedIn) {
      modal.querySelector("#auth-cancel").addEventListener("click", close);
      modal.querySelector("#auth-logout").addEventListener("click", async () => {
        const prev = viewer;
        await signOut();
        if (prev) addLog("Signed out (was " + prev + ").");
        close(); signingIn = true; render();
      });
    } else {
      const emailInp = modal.querySelector("#auth-email");
      const passInp = modal.querySelector("#auth-pass");
      const nameInp = modal.querySelector("#auth-name");
      const errDiv = modal.querySelector("#auth-err");
      const submitBtn = modal.querySelector("#auth-submit");
      setTimeout(() => (nameInp || emailInp).focus(), 30);

      const submit = async () => {
        const email = emailInp.value.trim();
        const pass = passInp.value;
        const name = nameInp ? nameInp.value.trim() : "";
        if (!email || !pass) { errDiv.innerHTML = '<p class="auth-err">Please fill in all fields.</p>'; return; }
        if (isSignUp && pass.length < 6) { errDiv.innerHTML = '<p class="auth-err">Password must be at least 6 characters.</p>'; return; }
        submitBtn.textContent = "…";
        submitBtn.disabled = true;
        try {
          if (isSignUp) { await signUp(email, pass, name || email.split("@")[0]); }
          else { await signIn(email, pass); }
          addLog("Signed in as " + viewer + ".");
          close(); render();
        } catch(e) {
          errDiv.innerHTML = '<p class="auth-err">' + escapeHtml(e.message) + '</p>';
          submitBtn.textContent = isSignUp ? "Create account" : "Sign in";
          submitBtn.disabled = false;
        }
      };
      submitBtn.addEventListener("click", submit);
      passInp.addEventListener("keydown", e => { if (e.key === "Enter") submit(); });
      emailInp.addEventListener("keydown", e => { if (e.key === "Enter") passInp.focus(); });
      if (nameInp) nameInp.addEventListener("keydown", e => { if (e.key === "Enter") emailInp.focus(); });

      modal.querySelector("#tab-signin").addEventListener("click", () => { if (isSignUp) { isSignUp = false; mount(); } });
      modal.querySelector("#tab-signup").addEventListener("click", () => { if (!isSignUp) { isSignUp = true; mount(); } });
    }

    if (isLoggedIn) backdrop.addEventListener("click", e => { if (e.target === backdrop) close(); });
  }

  const close = () => { backdrop.remove(); signingIn = false; };
  document.body.appendChild(backdrop);
  mount();
}

function renderEditor(k){
  if (document.querySelector(".backdrop")) return;
  const e = data[k] || { parent:null, notes:"", time:"" };
  const draft = { parent: e.parent||"", time: e.time||"", notes: e.notes||"", unresolved: !!e.unresolved, assignee: e.assignee||"" };
  const hasEntry = !!data[k];

  const backdrop = el(`<div class="backdrop"></div>`);
  const modal = el(`
    <div class="modal" style="max-height:90vh;overflow-y:auto;">
      <h3>${prettyDate(k)}</h3>
      <label class="flabel">Who has the kids?</label>
      <div class="pick">
        ${[["","—"],["B","Bobby"],["A","Allie"],["BA","Both"],["TBD","TBD"]].map(([v,l])=>
          `<button class="pp ${draft.parent===v?"on":""} ${v?("p"+v.toLowerCase()):""}" data-v="${v}">${l}</button>`).join("")}
      </div>
      <label class="flabel">Pickup / dropoff time</label>
      <input class="inp" id="f-time" value="${escapeHtml(draft.time)}" placeholder="e.g. 3:15 PM, Morning, before dinner" />
      <label class="flabel">Notes</label>
      <textarea class="ta" id="f-notes" rows="2" placeholder="Anything worth remembering for this day…">${escapeHtml(draft.notes)}</textarea>
      <label class="checkrow"><input type="checkbox" id="f-unres" ${draft.unresolved?"checked":""}/> Mark as unresolved</label>
      <div id="f-assignee-row" style="${draft.unresolved ? "" : "display:none;"}margin-top:10px;">
        <label class="flabel">Needs decision from</label>
        <div class="pick">
          ${["","Bobby","Allie","Both"].map(v =>
            `<button class="pp assignee-pick ${draft.assignee===v?"on":""}" data-a="${v}">${v||"—"}</button>`).join("")}
        </div>
      </div>
      <div class="modal-actions">
        ${hasEntry?`<button class="btn btn-del" id="f-del">Delete</button>`:""}
        <div class="right">
          <button class="btn btn-ghost" id="f-cancel">Cancel</button>
          <button class="btn btn-primary" id="f-save">Save</button>
        </div>
      </div>
      <div class="chat-section">
        <p class="chat-label">Chat</p>
        <div class="chat-messages" id="chat-list">
          <span class="chat-empty">Loading…</span>
        </div>
        <div class="chat-input-row">
          <input class="inp" id="chat-inp" placeholder="Type a message…" />
          <button class="chat-send" id="chat-send">Send</button>
        </div>
      </div>
    </div>
  `);

  backdrop.appendChild(modal);
  document.body.appendChild(backdrop);

  // --- Parent picker ---
  modal.querySelectorAll(".pp:not(.assignee-pick)").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      draft.parent = btn.getAttribute("data-v");
      modal.querySelectorAll(".pp:not(.assignee-pick)").forEach(b=>{
        const v=b.getAttribute("data-v");
        b.classList.toggle("on", v===draft.parent);
      });
    });
  });

  // --- Assignee picker ---
  modal.querySelectorAll(".assignee-pick").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      draft.assignee = btn.getAttribute("data-a");
      modal.querySelectorAll(".assignee-pick").forEach(b=>{
        b.classList.toggle("on", b.getAttribute("data-a")===draft.assignee);
      });
    });
  });

  // --- Toggle assignee row with unresolved checkbox ---
  const unresCheck = modal.querySelector("#f-unres");
  const assigneeRow = modal.querySelector("#f-assignee-row");
  unresCheck.addEventListener("change", () => {
    assigneeRow.style.display = unresCheck.checked ? "" : "none";
    if (!unresCheck.checked) {
      draft.assignee = "";
      modal.querySelectorAll(".assignee-pick").forEach(b => b.classList.remove("on"));
    }
  });

  // --- Form actions ---
  const close = ()=>{ backdrop.remove(); editingKey=null; };
  backdrop.addEventListener("click", e=>{ if(e.target===backdrop) close(); });
  modal.querySelector("#f-cancel").addEventListener("click", close);
  modal.querySelector("#f-save").addEventListener("click", ()=>{
    draft.time = modal.querySelector("#f-time").value;
    draft.notes = modal.querySelector("#f-notes").value;
    draft.unresolved = modal.querySelector("#f-unres").checked;
    backdrop.remove();
    saveEntry(k, draft);
  });
  const del = modal.querySelector("#f-del");
  if (del) del.addEventListener("click", ()=>{ backdrop.remove(); deleteEntry(k); });

  // --- Chat ---
  const chatList = modal.querySelector("#chat-list");
  const chatInp = modal.querySelector("#chat-inp");
  const chatSendBtn = modal.querySelector("#chat-send");

  function renderMsg(msg) {
    const when = msg.created_at ? new Date(msg.created_at) : new Date();
    const timeStr = when.toLocaleDateString("en-US",{month:"short",day:"numeric"}) + " " +
                    when.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"});
    return el(`
      <div class="chat-msg">
        <div class="chat-msg-head">
          <span class="chat-msg-who">${escapeHtml(msg.user_name)}</span>
          <span class="chat-msg-when">${timeStr}</span>
        </div>
        <div class="chat-msg-text">${escapeHtml(msg.message)}</div>
      </div>
    `);
  }

  function renderChatList(msgs) {
    chatList.innerHTML = "";
    if (!msgs.length) {
      chatList.appendChild(el(`<span class="chat-empty">No messages yet.</span>`));
    } else {
      msgs.forEach(m => chatList.appendChild(renderMsg(m)));
      chatList.scrollTop = chatList.scrollHeight;
    }
  }

  let chatMessages = [];
  loadMessages(k).then(msgs => { chatMessages = msgs; renderChatList(msgs); });

  const doSend = async () => {
    const text = chatInp.value.trim();
    if (!text) return;
    chatInp.value = "";
    chatSendBtn.disabled = true;
    try {
      const msg = await sendMessage(k, text);
      chatMessages.push(msg);
      renderChatList(chatMessages);
    } catch(e) {}
    chatSendBtn.disabled = false;
    chatInp.focus();
  };
  chatSendBtn.addEventListener("click", doSend);
  chatInp.addEventListener("keydown", e => { if (e.key === "Enter") doSend(); });
}

async function boot() {
  await refreshToken();
  if (!authUser) signingIn = true;
  render();
  await loadFromRemote();
  if (authUser) await loadUnseenChats();
  render();   // re-render with activity panel data
  updateLastSeen();
  startRealtime();
}
boot();
</script>
</body>
