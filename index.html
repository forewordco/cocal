<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="theme-color" content="#1d2a2f" />
<title>Summer Co-Parenting Calendar</title>
<link rel="manifest" href="manifest.json" />
<link rel="icon" type="image/svg+xml" href="icon.svg" />
<link rel="apple-touch-icon" href="icon-192.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Newsreader:ital,opsz@0,6..72;1,6..72&display=swap" rel="stylesheet" />
<style>
  :root {
    --b: #1f6fb2;
    --b-soft: #cfe4f4;
    --b-tint: #d4e6f5;
    --b-line: #9cc6e8;
    --a: #11a89b;
    --a-soft: #c4e8e1;
    --a-tint: #cfece5;
    --a-line: #8bd3c8;
    --ba: #6d3bd1;
    --ba-soft: #e0d0f7;
    --ba-tint: #d8c6f4;
    --ba-line: #b49de0;
    --tbd: #b08830;
    --tbd-soft: #f5ecd8;
    --tbd-tint: #f5ecd8;
    --tbd-line: #dbc89e;
    --ink: #1d2a2f;
    --purple: #6d3bd1;
    --purple-soft: #efe7fb;
    --muted: #8a9499;
    --paper: #f5f7f6;
    --card: #ffffff;
    --line: #e4eaea;
    --shadow: rgba(20,50,60,.08);
    --radius: 10px;
    --ff: 'Fraunces', serif;
    --fs: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; }
  html, body { padding: 0; }
  body {
    font-family: var(--fs);
    color: var(--ink);
    background: var(--paper);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .wrap {
    width: min(96vw, 1440px);
    margin: 0 auto;
    padding: 20px clamp(10px, 2.5vw, 32px) 60px;
  }

  /* ---------- Header ---------- */
  header.top {
    display: flex; flex-wrap: wrap; align-items: baseline;
    gap: 10px 20px;
    padding-bottom: 14px; margin-bottom: 6px;
    border-bottom: 1.5px solid var(--line);
  }
  .title {
    font-family: var(--ff); font-weight: 700;
    font-size: clamp(22px, 4vw, 32px); line-height: 1; margin: 0;
    letter-spacing: -0.025em;
  }
  .subtitle { color: var(--muted); font-size: 13px; letter-spacing: .01em; }
  .legend {
    display: flex; flex-wrap: wrap; gap: 6px;
    margin-left: auto; align-items: center;
  }
  .chip {
    display: inline-flex; align-items: center; gap: 5px;
    font-family: var(--fs); font-weight: 500; font-size: 11.5px;
    padding: 3px 9px; border-radius: 6px; background: transparent;
    border: none; color: var(--muted); white-space: nowrap;
  }
  .chip i { width: 8px; height: 8px; border-radius: 2px; display: inline-block; flex-shrink: 0; }
  .sw-b { background: var(--b); }
  .sw-a { background: var(--a); }
  .sw-t { background: linear-gradient(135deg, var(--b) 40%, var(--a) 60%); }
  .sw-tbd { background: var(--tbd); }
  .sw-q { background: repeating-linear-gradient(45deg, #aeb8b8, #aeb8b8 2px, #d2dada 2px, #d2dada 4px); }

  /* ---------- Toolbar ---------- */
  .toolbar {
    display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
    padding: 10px 0 16px;
  }
  .btn {
    font-family: var(--fs); font-weight: 500; font-size: 12px;
    padding: 6px 12px; border-radius: 7px; cursor: pointer;
    border: 1px solid var(--line); background: var(--card); color: var(--ink);
    transition: .12s; display: inline-flex; align-items: center; gap: 5px;
    letter-spacing: .01em;
  }
  .btn:hover { border-color: #b8c4c4; background: #f0f3f2; }
  .btn-primary { background: var(--ink); color: #fff; border-color: var(--ink); }
  .btn-primary:hover { background: #2c3f46; }
  .btn-ghost { background: transparent; border-color: transparent; color: var(--muted); font-size: 11px; }
  .btn-ghost:hover { color: var(--ink); background: transparent; }
  .spacer { flex: 1; }

  /* ---------- Month ---------- */
  .month { margin-bottom: 28px; }
  .month-name {
    font-family: var(--ff); font-weight: 600; font-size: 17px;
    margin: 0 0 8px; letter-spacing: -0.01em;
  }
  .month-name span { color: var(--muted); font-weight: 400; font-size: 14px; }
  .dow {
    display: grid; grid-template-columns: repeat(7, 1fr);
    font-family: var(--fs); font-size: 10px; letter-spacing: .06em; font-weight: 500;
    text-transform: uppercase; color: var(--muted); margin-bottom: 4px;
  }
  .dow span { text-align: center; }
  .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }

  .cell {
    position: relative; min-height: 100px; border-radius: 8px;
    border: 1px solid var(--line); background: var(--card);
    padding: 6px 7px; font-size: 11px; line-height: 1.28;
    display: flex; flex-direction: column; overflow: hidden;
    transition: transform .1s ease, box-shadow .1s ease;
  }
  .cell.empty { border: none; background: transparent; min-height: 0; }
  .cell.out { opacity: .25; background: transparent; }
  .cell.past { min-height: 38px; opacity: .5; }
  .cell.past .note-text, .cell.past .time, .cell.past .note-dot, .cell.past .resolve { display: none; }
  .cell.today { border-width: 2px; box-shadow: 0 2px 10px var(--shadow); z-index: 1; }
  .cell.today.c-b  { border-color: var(--b); background: color-mix(in oklch, var(--b-tint) 75%, var(--b) 25%); }
  .cell.today.c-a  { border-color: var(--a); background: color-mix(in oklch, var(--a-tint) 75%, var(--a) 25%); }
  .cell.today.c-ba { border-color: var(--ba); background: color-mix(in oklch, var(--ba-tint) 75%, var(--ba) 25%); }
  .cell.today.c-tbd { border-color: var(--tbd); background: color-mix(in oklch, var(--tbd-tint) 75%, var(--tbd) 25%); }
  .cell.today.c-none { border-color: var(--ink); }
  .cell.active { cursor: pointer; }
  .cell.active:hover { transform: translateY(-1px); box-shadow: 0 4px 12px var(--shadow); z-index: 2; }

  .cell-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2px; position: relative; z-index: 2; }
  .daynum { font-family: var(--ff); font-weight: 600; font-size: 13px; }
  .tag {
    font-family: var(--fs); font-weight: 600; font-size: 9px;
    padding: 1px 5px; border-radius: 4px; letter-spacing: .02em;
  }
  .time { font-family: var(--fs); font-weight: 600; font-size: 10.5px; margin-bottom: 1px; }
  .note-dot {
    position: absolute; right: 5px; bottom: 5px;
    width: 16px; height: 16px; border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    background: rgba(29,42,47,.06); color: var(--muted);
    pointer-events: none;
  }
  .note-dot svg { width: 10px; height: 10px; display: block; }
  .note-text {
    position: relative; z-index: 2; margin-top: auto;
    font-family: var(--fs);
    font-size: 9.5px; line-height: 1.3; color: var(--ink); opacity: .6;
    padding-right: 18px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .c-b .note-dot { background: rgba(31,111,178,.12); color: var(--b); }
  .c-a .note-dot { background: rgba(17,168,155,.14); color: var(--a); }
  .c-ba .note-dot { background: rgba(91,122,134,.14); color: var(--ba); }
  .c-trans .note-dot { background: rgba(109,59,209,.12); color: var(--purple); }

  .c-b { background: var(--b-tint); border-color: var(--b-line); }
  .c-b .tag { background: var(--b); color: #fff; } .c-b .time { color: var(--b); }
  .c-a { background: var(--a-tint); border-color: var(--a-line); }
  .c-a .tag { background: var(--a); color: #fff; } .c-a .time { color: var(--a); }
  .c-ba { background: var(--ba-tint); border-color: var(--ba-line); }
  .c-ba .tag { background: var(--ba); color: #fff; } .c-ba .time { color: var(--ba); }
  .c-tbd { background: var(--tbd-tint); border-color: var(--tbd-line); }
  .c-tbd .tag { background: var(--tbd); color: #fff; } .c-tbd .time { color: var(--tbd); }
  .c-tbd .note-dot { background: rgba(176,136,48,.12); color: var(--tbd); }
  .c-none { background: var(--card); }

  .c-trans { border-color: #c3b0e8; }
  .c-trans .time { color: var(--ink); }
  .c-trans::after {
    content: ""; position: absolute; inset: 0; pointer-events: none; border-radius: inherit;
    background: linear-gradient(135deg, transparent calc(50% - 0.5px), var(--line) calc(50% - 0.5px), var(--line) calc(50% + 0.5px), transparent calc(50% + 0.5px));
  }
  .tag-trans {
    background: var(--purple) !important; color: #fff;
    border: 1px solid var(--purple); padding: 1px 5px;
    position: relative; z-index: 3;
  }

  .c-unres {
    filter: grayscale(.85) opacity(.72);
    background: #eef1f0 !important; border-color: #d3dcdb !important; border-style: dashed;
  }
  .c-unres .tag { background: #8f9a9a !important; color: #fff; }
  .c-unres .time { color: #5f6a6a !important; }
  .resolve {
    margin-top: 4px; align-self: flex-start;
    font-family: var(--fs); font-weight: 600; font-size: 9px;
    padding: 2px 8px; border-radius: 4px;
    border: 1px solid #b8c2c2; background: #fff; color: #54605f; cursor: pointer; transition: .12s;
  }
  .resolve:hover { background: var(--ink); color: #fff; border-color: var(--ink); }

  /* ---------- Toolbar popups ---------- */
  .tb-group { position: relative; display: inline-flex; }
  .tb-icon {
    font-family: var(--fs); font-weight: 500; font-size: 12px;
    padding: 6px 10px; border-radius: 7px; cursor: pointer;
    border: 1px solid var(--line); background: var(--card); color: var(--muted);
    transition: .12s; display: inline-flex; align-items: center; gap: 5px;
    position: relative;
  }
  .tb-icon:hover { border-color: #b8c4c4; color: var(--ink); }
  .tb-icon.has-items { color: var(--ink); }
  .tb-icon svg { width: 15px; height: 15px; display: block; }
  .tb-badge {
    position: absolute; top: -5px; right: -5px;
    font-size: 9px; font-weight: 700; min-width: 16px; height: 16px;
    padding: 0 4px; border-radius: 8px; text-align: center; line-height: 16px;
    color: #fff; pointer-events: none;
  }
  .tb-badge-red { background: #c0392b; }
  .tb-badge-amber { background: var(--tbd); }
  .tb-badge-blue { background: var(--b); }
  .popup {
    position: absolute; top: calc(100% + 6px); right: 0;
    width: 340px; max-height: 420px; overflow-y: auto;
    background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
    box-shadow: 0 12px 36px rgba(15,40,45,.18); z-index: 40;
    animation: pop .12s ease;
  }
  .popup-header {
    font-family: var(--fs); font-weight: 600; font-size: 11px;
    text-transform: uppercase; letter-spacing: .04em; color: var(--muted);
    padding: 12px 14px 8px; border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 6px;
  }
  .popup-body { padding: 6px 0; }
  .popup-item {
    display: flex; flex-direction: column; gap: 1px; padding: 8px 14px;
    font-size: 12px; cursor: pointer; transition: .08s;
  }
  .popup-item:hover { background: var(--paper); }
  .popup-item-head { display: flex; align-items: baseline; gap: 8px; }
  .popup-item-date { font-weight: 600; font-size: 11px; color: var(--ink); white-space: nowrap; }
  .popup-item-detail { flex: 1; color: var(--ink); }
  .popup-item-detail .pw { font-weight: 600; }
  .popup-item-meta { color: var(--muted); font-size: 10.5px; white-space: nowrap; }
  .popup-item-sub { color: var(--muted); font-size: 11px; }
  .popup-item-tag { font-size: 10px; font-weight: 600; color: var(--tbd); }
  .popup-section-label {
    font-family: var(--fs); font-weight: 600; font-size: 10px;
    text-transform: uppercase; letter-spacing: .05em; color: var(--muted);
    padding: 10px 14px 4px; display: flex; align-items: center; gap: 5px;
  }
  .popup-section-label .dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
  .popup-empty { color: var(--muted); font-style: italic; font-size: 12px; padding: 14px; }
  .popup-divider { border: none; border-top: 1px solid var(--line); margin: 0; }
  .clearlog {
    display: block; width: 100%; text-align: center;
    font-family: var(--fs); font-size: 11px; color: var(--muted);
    background: none; border: none; border-top: 1px solid var(--line);
    cursor: pointer; padding: 8px 14px; transition: .1s;
  }
  .clearlog:hover { color: var(--ink); background: var(--paper); }

  /* ---------- Changelog items inside popup ---------- */
  .log-item {
    display: flex; gap: 8px; padding: 7px 14px; font-size: 12px;
    border-bottom: 1px solid var(--line); align-items: baseline;
  }
  .log-item:last-of-type { border-bottom: none; }
  .log-when {
    font-family: var(--fs); font-weight: 500; font-size: 10.5px; color: var(--muted);
    white-space: nowrap; min-width: 55px;
  }
  .log-who {
    font-family: var(--fs); font-weight: 600; font-size: 11px; color: var(--ink);
    white-space: nowrap;
  }
  .log-anon { color: var(--muted); font-style: italic; font-weight: 400; }
  .log-what { flex: 1; font-size: 11.5px; }
  .log-what b { font-weight: 600; }
  .log-empty { color: var(--muted); font-style: italic; font-size: 12px; padding: 14px; }
  .signin-sub { margin: 4px 0 6px; color: var(--muted); font-size: 12px; }

  /* ---------- Modal ---------- */
  .backdrop {
    position: fixed; inset: 0; background: rgba(20,35,40,.35); backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center; padding: 20px; z-index: 50;
    animation: fade .12s ease;
  }
  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: var(--card); border-radius: 14px; width: min(440px, 100%);
    padding: 22px 22px 18px; box-shadow: 0 20px 50px rgba(15,40,45,.25); border: 1px solid var(--line);
    animation: pop .15s ease;
  }
  @keyframes pop { from { transform: translateY(6px) scale(.98); opacity: 0; } to { transform: none; opacity: 1; } }
  .modal h3 { font-family: var(--ff); font-weight: 600; font-size: 20px; margin: 0 0 14px; }
  .flabel {
    display: block; font-family: var(--fs); font-size: 11px; letter-spacing: .04em; font-weight: 500;
    text-transform: uppercase; color: var(--muted); margin: 12px 0 6px;
  }
  .pick { display: flex; gap: 6px; flex-wrap: wrap; }
  .pp {
    font-family: var(--fs); font-size: 13px; font-weight: 500; padding: 7px 14px; border-radius: 7px;
    border: 1px solid var(--line); background: #fff; cursor: pointer; transition: .12s; color: var(--ink);
  }
  .pp:hover { border-color: #b8c4c4; }
  .pp.on { background: var(--ink); color: #fff; border-color: var(--ink); }
  .pp.on.pb { background: var(--b); border-color: var(--b); }
  .pp.on.pa { background: var(--a); border-color: var(--a); }
  .pp.on.pba { background: var(--ba); border-color: var(--ba); }
  .pp.on.ptbd { background: var(--tbd); border-color: var(--tbd); }
  .inp, .ta {
    width: 100%; font-family: var(--fs); font-size: 14px; padding: 9px 11px;
    border-radius: 7px; border: 1px solid var(--line); background: var(--paper); color: var(--ink); resize: vertical;
  }
  .inp:focus, .ta:focus { outline: 2px solid var(--b); border-color: var(--b); }
  .checkrow { display: flex; align-items: center; gap: 8px; margin-top: 14px; font-size: 13px; cursor: pointer; }
  .checkrow input { width: 15px; height: 15px; accent-color: var(--b); }
  .modal-actions { display: flex; align-items: center; margin-top: 20px; gap: 8px; }
  .modal-actions .right { display: flex; gap: 8px; margin-left: auto; }
  .btn-del { background: transparent; color: #c0392b; border-color: #e8d0ce; }
  .btn-del:hover { background: #c0392b; color: #fff; border-color: #c0392b; }
  .auth-err { color: #c0392b; font-size: 12px; margin: 6px 0 0; }
  .auth-tabs { display: flex; gap: 0; margin-bottom: 16px; border-bottom: 1.5px solid var(--line); }
  .auth-tab {
    flex: 1; text-align: center; padding: 8px 0; cursor: pointer;
    font-family: var(--fs); font-weight: 600; font-size: 13px;
    color: var(--muted); border-bottom: 2px solid transparent; margin-bottom: -1.5px;
    transition: .12s; background: none; border-top: none; border-left: none; border-right: none;
  }
  .auth-tab:hover { color: var(--ink); }
  .auth-tab.on { color: var(--ink); border-bottom-color: var(--ink); }
  .auth-loading { text-align: center; padding: 50px 20px; font-size: 14px; color: var(--muted); }
  .user-pill {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 12px; font-weight: 500;
    max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  /* ---------- Highlight my days ---------- */
  body.highlight-b .cell.c-a:not(.past):not(.c-trans) { opacity: .38; filter: saturate(.3); }
  body.highlight-b .cell.c-a.past:not(.c-trans) { opacity: .2; }
  body.highlight-a .cell.c-b:not(.past):not(.c-trans) { opacity: .38; filter: saturate(.3); }
  body.highlight-a .cell.c-b.past:not(.c-trans) { opacity: .2; }
  .btn.on { background: var(--ink); color: #fff; border-color: var(--ink); }
  .btn.on:hover { background: #2c3f46; }
  .hl-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }

  /* ---------- Main layout ---------- */
  .assignee-tag {
    font-family: var(--fs); font-size: 8.5px; font-weight: 600;
    padding: 1px 5px; border-radius: 4px;
    background: rgba(176,136,48,.15); color: var(--tbd);
    position: relative; z-index: 2;
  }

  /* ---------- Chat ---------- */
  .chat-section { margin-top: 18px; border-top: 1px solid var(--line); padding-top: 12px; }
  .chat-label {
    font-family: var(--fs); font-size: 11px; letter-spacing: .04em; font-weight: 500;
    text-transform: uppercase; color: var(--muted); margin: 0 0 8px;
  }
  .chat-messages {
    max-height: 200px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px;
    margin-bottom: 8px; padding-right: 4px;
  }
  .chat-empty { color: var(--muted); font-style: italic; font-size: 12px; }
  .chat-msg {
    display: flex; flex-direction: column; gap: 1px;
    padding: 7px 9px; border-radius: 7px; background: var(--paper);
    font-size: 13px; line-height: 1.4;
  }
  .chat-msg-head { display: flex; align-items: baseline; gap: 6px; }
  .chat-msg-who { font-weight: 600; font-size: 11px; color: var(--ink); }
  .chat-msg-when { font-size: 10px; color: var(--muted); }
  .chat-msg-text { color: var(--ink); }
  .chat-input-row { display: flex; gap: 5px; align-items: flex-end; }
  .chat-input-row .inp { flex: 1; font-size: 13px; padding: 7px 9px; }
  .chat-send {
    font-family: var(--fs); font-weight: 600; font-size: 12px;
    padding: 7px 12px; border-radius: 7px; border: none;
    background: var(--ink); color: #fff; cursor: pointer; transition: .12s; white-space: nowrap;
  }
  .chat-send:hover { background: #2c3f46; }
  .chat-send:disabled { opacity: .35; cursor: default; }

  /* ---------- Responsive ---------- */
  @media (max-width: 768px) {
    .wrap { padding: 16px clamp(6px, 2vw, 16px) 50px; }
    .title { font-size: clamp(20px, 5vw, 28px); }
    .legend { margin-left: 0; margin-top: 4px; width: 100%; }
    .grid { gap: 3px; }
    .cell { min-height: 80px; padding: 5px 5px; border-radius: 6px; }
    .daynum { font-size: 12px; }
    .tag { font-size: 8px; padding: 1px 4px; }
    .time { font-size: 10px; }
    .note-text { font-size: 8.5px; -webkit-line-clamp: 2; }
    .note-dot { width: 14px; height: 14px; right: 3px; bottom: 3px; }
    .note-dot svg { width: 8px; height: 8px; }
    .btn, .tb-icon { font-size: 11px; padding: 5px 10px; }
    .popup { width: min(340px, 92vw); right: -10px; }
  }

  @media (max-width: 480px) {
    .wrap { padding: 12px 6px 40px; }
    .title { font-size: clamp(19px, 5.5vw, 26px); }
    .subtitle { font-size: 11px; }
    .chip { font-size: 10px; padding: 2px 6px; }
    .chip i { width: 7px; height: 7px; }
    .toolbar { padding: 8px 0 12px; }
    .btn, .tb-icon { font-size: 10.5px; padding: 5px 8px; border-radius: 6px; }
    .month-name { font-size: 15px; }
    .dow { font-size: 9px; }
    .grid { gap: 2px; }
    .cell { min-height: 58px; padding: 3px 4px; font-size: 9.5px; border-radius: 5px; }
    .cell.past { min-height: 32px; }
    .daynum { font-size: 11px; }
    .tag { font-size: 7px; padding: 0px 3px; }

function urlBase64ToUint8Array(base64String) {
  const padding = "=".repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, "+").replace(/_/g, "/");
  const rawData = atob(base64);
  return new Uint8Array([...rawData].map(c => c.charCodeAt(0)));
}

async function subscribePush() {
  try {
    const reg = await navigator.serviceWorker.ready;
    const sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC)
    });
    pushSubscription = sub;
    // Save to Supabase
    const h = sbHeaders();
    await fetch(SB_URL + "/rest/v1/push_subscriptions", {
      method: "POST",
      headers: { ...h, "Prefer": "return=minimal,resolution=merge-duplicates" },

      await fetch(SB_URL + "/rest/v1/push_subscriptions?subscription->>endpoint=eq." + encodeURIComponent(endpoint), {

// ---- Supabase Realtime (live sync between devices) ----
function startRealtime() {
  const wsUrl = SB_URL.replace("https://", "wss://") + "/realtime/v1/websocket?apikey=" + SB_KEY + "&vsn=1.0.0";
  let ws, heartbeat;

  function connect() {
    ws = new WebSocket(wsUrl);
    ws.onopen = () => {
      ws.send(JSON.stringify({ topic: "realtime:public:cocal", event: "phx_join", payload: { config: { postgres_changes: [{ event: "UPDATE", schema: "public", table: "cocal" }] } }, ref: "1" }));
      heartbeat = setInterval(() => {
        ws.send(JSON.stringify({ topic: "phoenix", event: "heartbeat", payload: {}, ref: "hb" }));
      }, 30000);
    };
    ws.onmessage = (ev) => {
      try {
        const msg = JSON.parse(ev.data);
        if (msg.event === "postgres_changes" && msg.payload?.data?.record) {
          const rec = msg.payload.data.record;
          if (rec.data && typeof rec.data === "object") {
            // Only apply if it's actually different (avoid echo from our own save)
            if (JSON.stringify(rec.data) !== JSON.stringify(data)) {
              data = rec.data;
              if (rec.log) log = rec.log;
              render();
            }
          }
        }
      } catch(e) {}
    };
    ws.onclose = () => { clearInterval(heartbeat); setTimeout(connect, 3000); };
    ws.onerror = () => { ws.close(); };
  }
  connect();
}

// ---------- Date helpers ----------
function ymd(y,m,d){ return y+"-"+String(m+1).padStart(2,"0")+"-"+String(d).padStart(2,"0"); }
function inRange(k){ return k >= RANGE_START && k <= RANGE_END; }
function prettyDate(k){
  const d = new Date(k+"T00:00:00");
  return d.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});
}
function shortDate(k){
  const d = new Date(k+"T00:00:00");
  return d.toLocaleDateString("en-US",{month:"short",day:"numeric"});
}
function prettyTs(ts){
  return new Date(ts).toLocaleDateString("en-US",{month:"short",day:"numeric"}) + ", " +
         new Date(ts).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"});
}

// ---------- Transition detection ----------
function computeTransitions(){
  const map = {};
  let prev = null;
  let w = new Date(RANGE_START+"T00:00:00");
  const end = new Date(RANGE_END+"T00:00:00");
  while (w <= end) {
    const k = ymd(w.getFullYear(), w.getMonth(), w.getDate());
    const e = data[k];
    const cur = (e && e.parent) || null;
    if (cur) {
      if (prev && prev !== cur && !(e && e.unresolved)) map[k] = { from: prev, to: cur };
      prev = cur;
    }
    w.setDate(w.getDate()+1);
  }
  return map;
}

function findNextParent(k) {
  const d = new Date(k + "T00:00:00");
  const end = new Date(RANGE_END + "T00:00:00");
  d.setDate(d.getDate() + 1);
  while (d <= end) {
    const key = ymd(d.getFullYear(), d.getMonth(), d.getDate());
    const entry = data[key];
    if (entry && entry.parent && entry.parent !== "BA" && entry.parent !== "TBD") return entry.parent;
    d.setDate(d.getDate() + 1);
  }
  return null;
}

// ---------- ICS export ----------
function pad(n){ return String(n).padStart(2,"0"); }
function icsDate(k){ return k.replace(/-/g,""); }          // all-day: YYYYMMDD
function nextDay(k){
  const d = new Date(k+"T00:00:00"); d.setDate(d.getDate()+1);
  return ymd(d.getFullYear(), d.getMonth(), d.getDate());
}
function icsEscape(s){ return (s||"").replace(/\\/g,"\\\\").replace(/;/g,"\\;").replace(/,/g,"\\,").replace(/\n/g,"\\n"); }

function buildICS(){
  const now = new Date();
  const stamp = now.getUTCFullYear()+pad(now.getUTCMonth()+1)+pad(now.getUTCDate())+"T"+
                pad(now.getUTCHours())+pad(now.getUTCMinutes())+pad(now.getUTCSeconds())+"Z";
  const lines = [
    "BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//Coparenting//Summer 2026//EN",
    "CALSCALE:GREGORIAN","METHOD:PUBLISH","X-WR-CALNAME:Summer Co-Parenting 2026"
  ];
  Object.keys(data).sort().forEach(k => {
    if (!inRange(k)) return;
    const e = data[k];
    if (!e || (!e.parent && !e.notes && !e.time)) return;
    const who = e.parent ? (PMETA[e.parent]?.label || e.parent) : "Unassigned";
    let title = who;
    if (e.time) title += " · " + e.time;
    if (e.unresolved) title = "(?) " + title;
    const descParts = [];
    if (e.time) descParts.push("Pickup/dropoff: " + e.time);
    if (e.notes) descParts.push(e.notes);
    if (e.unresolved) descParts.push("[Unresolved — plan not yet set]");
    lines.push(
      "BEGIN:VEVENT",
      "UID:" + k + "-coparent@summer2026",
      "DTSTAMP:" + stamp,
      "DTSTART;VALUE=DATE:" + icsDate(k),
      "DTEND;VALUE=DATE:" + icsDate(nextDay(k)),
      "SUMMARY:" + icsEscape(title),
      "DESCRIPTION:" + icsEscape(descParts.join("\n")),
      "TRANSP:TRANSPARENT",
      "END:VEVENT"
    );
  });
  lines.push("END:VCALENDAR");
  // ICS spec wants CRLF line endings
  return lines.join("\r\n");
}

function downloadICS(){
  const blob = new Blob([buildICS()], { type: "text/calendar;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "summer-coparenting-2026.ics";
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 1500);
  addLog("Exported calendar (.ics) file."); render();
}

// ---------- Mutations ----------
function openEditor(k){ editingKey = k; render(); }
function closeEditor(){ editingKey = null; render(); }

function describeEntry(e){
  if (!e || (!e.parent && !e.notes && !e.time)) return "empty";
  const who = e.parent ? (PMETA[e.parent]?.label || e.parent) : "unassigned";
  return who + (e.time ? " ("+e.time+")" : "") + (e.unresolved ? " [unresolved]" : "");
}

function saveEntry(k, draft){
  const before = data[k];
  const cleaned = { parent: draft.parent || null, notes: (draft.notes||"").trim(), time: (draft.time||"").trim() };
  if (draft.unresolved) cleaned.unresolved = true;
  if (draft.assignee && draft.assignee.trim()) cleaned.assignee = draft.assignee.trim();
  let changed = false, summary = "";
  if (!cleaned.parent && !cleaned.notes && !cleaned.time) {
    if (before) { delete data[k]; changed = true; summary = "Cleared " + shortDate(k) + " (was " + describeEntry(before) + ")."; }
  } else {
    const beforeDesc = describeEntry(before);
    const afterDesc  = describeEntry(cleaned);
    if (JSON.stringify(before||{}) !== JSON.stringify(cleaned)) {
      data[k] = cleaned; changed = true;
      summary = (before ? "Updated " : "Added ") + shortDate(k) + ": " + beforeDesc + (before ? " → " : "") + (before ? afterDesc : afterDesc) + ".";
      if (!before) summary = "Added " + shortDate(k) + ": " + afterDesc + ".";
    }
  }
  if (changed) { saveData(); addLog(summary); notifyPush("change", summary); }
  editingKey = null; render();
}

function deleteEntry(k){
  const before = data[k];
  if (before) { delete data[k]; saveData(); addLog("Removed entry for " + shortDate(k) + " (was " + describeEntry(before) + ")."); }
  editingKey = null; render();
}

function resolveEntry(k){
  const e = data[k];
  if (e && e.unresolved) { delete e.unresolved; saveData(); addLog("Resolved " + shortDate(k) + " — set as " + describeEntry(e) + "."); render(); }
}

function resetAll(){
  if (!confirm("Reset the whole calendar back to the original schedule? Your edits and changelog will be lost.")) return;
  data = structuredClone(SEED);
  log = [{ ts: Date.now(), text: "Calendar reset to the original summer schedule." }];
  saveData(); saveLog(); render();
}

function clearLog(){
  if (!confirm("Clear the changelog? (Your schedule stays untouched.)")) return;
  log = [{ ts: Date.now(), text: "Changelog cleared." }];
  saveLog(); render();
}

// ---------- Render ----------
function el(html){ const t = document.createElement("template"); t.innerHTML = html.trim(); return t.content.firstChild; }

function render(){
  const root = document.getElementById("root");
  const mp = myParentCode();
  document.body.classList.remove("highlight-b", "highlight-a");
  if (highlightMine && mp) document.body.classList.add("highlight-" + mp.toLowerCase());
  const trans = computeTransitions();

  let b=0,a=0,ba=0,tbd=0,q=0;
  Object.entries(data).forEach(([k,v])=>{ if(!inRange(k))return; if(v.unresolved)q++; if(v.parent==="B")b++; else if(v.parent==="A")a++; else if(v.parent==="BA")ba++; else if(v.parent==="TBD")tbd++; });
  const tCount = Object.keys(trans).length;

  root.innerHTML = `
    <header class="top">
      <h1 class="title">Summer Co-Parenting</h1>
      <p class="subtitle">May 25 – Sep 7 · 2026</p>
      <div class="legend">
        <span class="chip"><i class="sw-b"></i> Bobby ${b}</span>
        <span class="chip"><i class="sw-a"></i> Allie ${a}</span>
        ${ba?`<span class="chip"><i class="sw-a" style="background:var(--ba)"></i> Both ${ba}</span>`:""}
        ${tbd?`<span class="chip"><i class="sw-tbd"></i> TBD ${tbd}</span>`:""}
        ${tCount?`<span class="chip"><i class="sw-t"></i> Trans ${tCount}</span>`:""}
        ${q?`<span class="chip"><i class="sw-q"></i> Unres ${q}</span>`:""}
      </div>
    </header>

    <div class="toolbar">
      <button class="btn btn-primary" id="ics">⤓ .ics</button>
      <button class="btn" id="viewer">${authUser ? `<span class="user-pill">👤 ${escapeHtml(viewer)}</span>` : "Sign in"}</button>
      ${mp ? `<button class="btn ${highlightMine?"on":""}" id="hl-toggle"><span class="hl-dot" style="background:var(--${mp.toLowerCase()})"></span>${highlightMine ? "My days" : "Highlight"}</button>` : ""}
      ${pushSupported && authUser ? `<button class="btn ${pushSubscription?"on":""}" id="notif-toggle">${pushSubscription ? "🔔 On" : "🔕 Notify"}</button>` : ""}
      <span class="spacer"></span>
      <div class="tb-group" id="tg-activity"></div>
      <div class="tb-group" id="tg-comments"></div>
      <div class="tb-group" id="tg-unresolved"></div>
      <div class="tb-group" id="tg-changelog"></div>
      <button class="btn btn-ghost" id="reset" title="Reset to original schedule">Reset</button>
    </div>

    <div id="months"></div>
  `;

  // Months
  const monthsWrap = root.querySelector("#months");
  MONTHS.forEach(({y,m}) => {
    const firstDow = new Date(y,m,1).getDay();
    const dim = new Date(y,m+1,0).getDate();
    const anyIn = Array.from({length:dim},(_,i)=>ymd(y,m,i+1)).some(inRange);
    if (!anyIn) return;

    const sec = el(`<section class="month"></section>`);
    sec.appendChild(el(`<h2 class="month-name">${MONTH_NAMES[m]} <span>${y}</span></h2>`));
    sec.appendChild(el(`<div class="dow">${DOW.map(d=>`<span>${d}</span>`).join("")}</div>`));
    const grid = el(`<div class="grid"></div>`);

    const cells = [];
    for (let i=0;i<firstDow;i++) cells.push(null);
    for (let d=1; d<=dim; d++) cells.push(d);
    while (cells.length % 7 !== 0) cells.push(null);

    cells.forEach(d => {
      if (d === null){ grid.appendChild(el(`<div class="cell empty"></div>`)); return; }
      const k = ymd(y,m,d);
      const active = inRange(k);
      const e = data[k];
      const t = trans[k];
      const unres = e && e.unresolved;
      // If coming FROM a Both/TBD day, suppress transition — that day already shows the full chain
      const isTrans = !!t && !unres && t.from !== "BA" && t.from !== "TBD";
      // Gradient only for direct B↔A transitions
      const showGradient = isTrans && t.to !== "BA" && t.to !== "TBD";

      const isPast = k < TODAY;
      const isToday = k === TODAY;
      const pcls = e&&e.parent==="B"?"c-b":e&&e.parent==="A"?"c-a":e&&e.parent==="BA"?"c-ba":e&&e.parent==="TBD"?"c-tbd":"c-none";
      const cls = ["cell", active?"active":"out", pcls, unres?"c-unres":"", showGradient?"c-trans":"", isPast?"past":"", isToday?"today":""].join(" ");

      const cell = el(`<div class="${cls}" tabindex="${active?0:-1}"></div>`);

      if (showGradient) {
        const dimOther = highlightMine && mp;
        const gCol = p => {
          const isOther = dimOther && p !== mp;
          if (p==="B") return isOther ? "#eef1f0" : "rgba(31,111,178,.22)";
          if (p==="A") return isOther ? "#eef1f0" : "rgba(17,168,155,.22)";
          if (p==="TBD") return "rgba(176,136,48,.15)";
          return "rgba(109,59,209,.15)";
        };
        cell.style.background =
          `linear-gradient(135deg, ${gCol(t.from)} 0%, ${gCol(t.from)} 38%, ${gCol(t.to)} 62%, ${gCol(t.to)} 100%)`;
      }

      let tagHtml;
      if (isTrans && (e.parent === "BA" || e.parent === "TBD")) {
        // Both/TBD day: show full chain if parents differ on each side, otherwise just the label
        const nextP = findNextParent(k);
        if (nextP && nextP !== t.from) {
          tagHtml = `<span class="tag tag-trans">${PMETA[t.from]?.short}→${PMETA[e.parent]?.short}→${PMETA[nextP]?.short}</span>`;
        } else {
          tagHtml = `<span class="tag">${PMETA[e.parent]?.short}</span>`;
        }
      } else if (isTrans) {
        tagHtml = `<span class="tag tag-trans">${PMETA[t.from]?.short}→${PMETA[t.to]?.short}</span>`;
      } else {
        tagHtml = (e&&e.parent ? `<span class="tag">${PMETA[e.parent]?.short}</span>` : "");
      }

      cell.appendChild(el(`<div class="cell-top"><span class="daynum">${d}</span>${tagHtml}</div>`));
      if (e&&e.time && !isPast) cell.appendChild(el(`<div class="time">${escapeHtml(e.time)}</div>`));
      if (e&&e.assignee && !isPast) cell.appendChild(el(`<span class="assignee-tag">→ ${escapeHtml(e.assignee)}</span>`));
      if (e&&e.notes && e.notes.trim()) {
        const full = e.notes.trim();
        const nd = el(`<span class="note-dot"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4 3.5h16a.5.5 0 0 1 .5.5v10.6a.5.5 0 0 1-.146.353l-5.4 5.4a.5.5 0 0 1-.354.147H4a.5.5 0 0 1-.5-.5V4a.5.5 0 0 1 .5-.5Z" fill="currentColor" fill-opacity="0.9"/><path d="M14 20.5V15a.5.5 0 0 1 .5-.5h5.5" stroke="#ffffff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></span>`);
        nd.setAttribute("title", full);
        if (!unres) {
          const nt = el(`<div class="note-text">${escapeHtml(full)}</div>`);
          nt.setAttribute("title", full);
          cell.appendChild(nt);
        }
        cell.appendChild(nd);
      }
      if (unres) {
        const rb = el(`<button class="resolve">Resolve</button>`);
        rb.addEventListener("click", ev => { ev.stopPropagation(); resolveEntry(k); });
        cell.appendChild(rb);
      }
      if (active) cell.addEventListener("click", ()=>openEditor(k));
      grid.appendChild(cell);
    });

    sec.appendChild(grid);
    monthsWrap.appendChild(sec);
  });

  // --- Compute data for toolbar popups ---
  const unresolvedDates = Object.entries(data)
    .filter(([k,v]) => inRange(k) && v.unresolved && k >= TODAY)
    .sort(([a],[b]) => a.localeCompare(b));
  const recentChanges = log
    .filter(item => item.who && item.who !== viewer)
    .slice(0, 5);
  const unseenByDate = {};
  unseenChats.forEach(m => {
    if (!unseenByDate[m.date_key]) unseenByDate[m.date_key] = [];
    unseenByDate[m.date_key].push(m);
  });
  const unseenDateKeys = Object.keys(unseenByDate).sort();
  const activityCount = unseenDateKeys.length + recentChanges.length;
  const chatCount = unseenDateKeys.length;
  const unresCount = unresolvedDates.length;

  // Helper: close all open popups
  function closePopups() { root.querySelectorAll(".popup").forEach(p => p.remove()); }

  // Helper: toggle a popup under a toolbar group
  function togglePopup(groupId, buildFn) {
    const group = root.querySelector("#" + groupId);
    const existing = group.querySelector(".popup");
    closePopups();
    if (existing) return; // was open, now closed
    const popup = buildFn();
    group.appendChild(popup);
    // Close on outside click
    const handler = (e) => {
      if (!group.contains(e.target)) { popup.remove(); document.removeEventListener("click", handler, true); }
    };
    setTimeout(() => document.addEventListener("click", handler, true), 0);
  }

  // SVG icons for toolbar
  const svgActivity = `<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h12v12H4z"/><path d="M8 2v4M12 2v4M4 8h12"/></svg>`;
  const svgChat = `<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 4h14v9H7l-4 3V4z"/></svg>`;
  const svgUnres = `<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="10" r="7.5"/><path d="M8 8a2.5 2.5 0 0 1 4.3 1.7c0 1.3-2.3 1.3-2.3 2.8"/><circle cx="10" cy="15" r=".8" fill="currentColor"/></svg>`;
  const svgLog = `<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 4h10M5 8h10M5 12h7M5 16h4"/></svg>`;

  // ---- Activity icon ----
  const tgAct = root.querySelector("#tg-activity");
  const actBtn = el(`<button class="tb-icon ${activityCount?"has-items":"" }" title="Activity">${svgActivity}${activityCount ? `<span class="tb-badge tb-badge-red">${activityCount}</span>` : ""}</button>`);
  actBtn.addEventListener("click", () => togglePopup("tg-activity", () => {
    const p = el(`<div class="popup"></div>`);
    p.appendChild(el(`<div class="popup-header">Activity</div>`));
    const body = el(`<div class="popup-body"></div>`);
    if (!activityCount) { body.appendChild(el(`<div class="popup-empty">No new activity</div>`)); }
    else {
      if (unseenDateKeys.length) {
        body.appendChild(el(`<div class="popup-section-label"><span class="dot" style="background:#c0392b"></span> New messages</div>`));
        unseenDateKeys.forEach(dk => {
          const msgs = unseenByDate[dk];
          const last = msgs[0];
          const item = el(`<div class="popup-item"><div class="popup-item-head"><span class="popup-item-date">${shortDate(dk)}</span><span class="popup-item-detail"><span class="pw">${escapeHtml(last.user_name)}</span>: ${escapeHtml(last.message.slice(0,50))}${last.message.length>50?"…":""}</span><span class="popup-item-meta">${msgs.length > 1 ? msgs.length + " msgs" : ""}</span></div></div>`);
          item.addEventListener("click", () => { closePopups(); openEditor(dk); });
          body.appendChild(item);
        });
      }
      if (recentChanges.length) {
        if (unseenDateKeys.length) body.appendChild(el(`<hr class="popup-divider">`));
        body.appendChild(el(`<div class="popup-section-label"><span class="dot" style="background:var(--b)"></span> Recent changes</div>`));
        recentChanges.forEach(item => {
          body.appendChild(el(`<div class="popup-item" style="cursor:default"><div class="popup-item-head"><span class="popup-item-date">${prettyTs(item.ts).split(",")[0]}</span><span class="popup-item-detail"><span class="pw">${escapeHtml(item.who)}</span>: ${escapeHtml(item.text.slice(0,60))}</span></div></div>`));
        });
      }
    }
    p.appendChild(body);
    return p;
  }));
  tgAct.appendChild(actBtn);

  // ---- Comments icon ----
  const tgChat = root.querySelector("#tg-comments");
  const chatBtn = el(`<button class="tb-icon ${chatCount?"has-items":""}" title="Comments">${svgChat}${chatCount ? `<span class="tb-badge tb-badge-blue">${chatCount}</span>` : ""}</button>`);
  chatBtn.addEventListener("click", () => togglePopup("tg-comments", () => {
    const p = el(`<div class="popup"></div>`);
    p.appendChild(el(`<div class="popup-header">Comments</div>`));
    const body = el(`<div class="popup-body"></div>`);
    if (!chatCount) { body.appendChild(el(`<div class="popup-empty">No new comments</div>`)); }
    else {
      unseenDateKeys.forEach(dk => {
        const msgs = unseenByDate[dk];
        body.appendChild(el(`<div class="popup-section-label">${shortDate(dk)}</div>`));
        msgs.forEach(m => {
          const item = el(`<div class="popup-item"><div class="popup-item-head"><span class="popup-item-detail"><span class="pw">${escapeHtml(m.user_name)}</span>: ${escapeHtml(m.message.slice(0,70))}${m.message.length>70?"…":""}</span></div><span class="popup-item-sub">${prettyTs(m.created_at)}</span></div>`);
          item.addEventListener("click", () => { closePopups(); openEditor(dk); });
          body.appendChild(item);
        });
      });
    }
    p.appendChild(body);
    return p;
  }));
  tgChat.appendChild(chatBtn);

  // ---- Unresolved icon ----
  const tgUnres = root.querySelector("#tg-unresolved");
  const unresBtn = el(`<button class="tb-icon ${unresCount?"has-items":""}" title="Unresolved dates">${svgUnres}${unresCount ? `<span class="tb-badge tb-badge-amber">${unresCount}</span>` : ""}</button>`);
  unresBtn.addEventListener("click", () => togglePopup("tg-unresolved", () => {
    const p = el(`<div class="popup"></div>`);
    p.appendChild(el(`<div class="popup-header">Unresolved</div>`));
    const body = el(`<div class="popup-body"></div>`);
    if (!unresCount) { body.appendChild(el(`<div class="popup-empty">All dates resolved</div>`)); }
    else {
      unresolvedDates.forEach(([dk, v]) => {
        const who = v.parent ? (PMETA[v.parent]?.label || v.parent) : "Unassigned";
        const item = el(`<div class="popup-item"></div>`);
        item.appendChild(el(`<span class="popup-item-date">${shortDate(dk)} · ${who}</span>`));
        if (v.notes && v.notes.trim()) {
          const preview = v.notes.trim().length > 50 ? v.notes.trim().slice(0,50) + "…" : v.notes.trim();
          item.appendChild(el(`<span class="popup-item-sub">${escapeHtml(preview)}</span>`));
        }
        if (v.assignee) item.appendChild(el(`<span class="popup-item-tag">→ ${escapeHtml(v.assignee)}</span>`));
        item.addEventListener("click", () => { closePopups(); openEditor(dk); });
        body.appendChild(item);
      });
    }
    p.appendChild(body);
    return p;
  }));
  tgUnres.appendChild(unresBtn);

  // ---- Changelog icon ----
  const tgLog = root.querySelector("#tg-changelog");
  const logBtn = el(`<button class="tb-icon" title="Changelog">${svgLog}</button>`);
  logBtn.addEventListener("click", () => togglePopup("tg-changelog", () => {
    const p = el(`<div class="popup"></div>`);
    p.appendChild(el(`<div class="popup-header">Changelog</div>`));
    const body = el(`<div class="popup-body"></div>`);
    if (!log.length) { body.appendChild(el(`<div class="popup-empty">No changes yet</div>`)); }
    else {
      log.slice(0, 15).forEach(item => {
        const whoLabel = item.who ? escapeHtml(item.who) : "<span class='log-anon'>anon</span>";
        body.appendChild(el(
          `<div class="log-item"><span class="log-when">${prettyTs(item.ts)}</span><span class="log-who">${whoLabel}</span><span class="log-what">${escapeHtml(item.text)}</span></div>`
        ));
      });
    }
    p.appendChild(body);
    const clr = el(`<button class="clearlog" id="clearlog">Clear log</button>`);
    clr.addEventListener("click", () => { clearLog(); closePopups(); });
    p.appendChild(clr);
    return p;
  }));
  tgLog.appendChild(logBtn);

  // Wire toolbar
  root.querySelector("#ics").addEventListener("click", downloadICS);
  root.querySelector("#reset").addEventListener("click", resetAll);
  root.querySelector("#viewer").addEventListener("click", () => { signingIn = true; render(); });
  const hlBtn = root.querySelector("#hl-toggle");
  if (hlBtn) hlBtn.addEventListener("click", toggleHighlight);
  const notifBtn = root.querySelector("#notif-toggle");
  if (notifBtn) notifBtn.addEventListener("click", () => pushSubscription ? unsubscribePush() : subscribePush());

  if (signingIn) renderSignIn();
  if (editingKey) renderEditor(editingKey);
}

function escapeHtml(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function renderSignIn(){
  if (document.querySelector(".backdrop")) return;
  const isLoggedIn = !!authUser;
  let isSignUp = false;

  function buildModal() {
    return isLoggedIn ? `
      <div class="modal">
        <h3>Account</h3>
        <p class="signin-sub">Signed in as <b>${escapeHtml(authUser.email)}</b></p>
        <div class="modal-actions">
          <button class="btn btn-del" id="auth-logout">Sign out</button>
          <div class="right"><button class="btn btn-ghost" id="auth-cancel">Close</button></div>
        </div>
      </div>
    ` : `
      <div class="modal">
        <div class="auth-tabs">
          <button class="auth-tab ${isSignUp ? "" : "on"}" id="tab-signin">Sign in</button>
          <button class="auth-tab ${isSignUp ? "on" : ""}" id="tab-signup">Create account</button>
        </div>
        ${isSignUp ? `
          <label class="flabel">Display name</label>
          <input class="inp" id="auth-name" placeholder="e.g. Bobby, Allie, Grandma" autocomplete="name" />
        ` : ""}
        <label class="flabel">Email</label>
        <input class="inp" id="auth-email" type="email" placeholder="you@example.com" autocomplete="email" />
        <label class="flabel">Password</label>
        <input class="inp" id="auth-pass" type="password" placeholder="${isSignUp ? "Choose a password (6+ chars)" : "Your password"}" autocomplete="${isSignUp ? "new-password" : "current-password"}" />
        <div id="auth-err"></div>
        <div class="modal-actions">
          <div class="right" style="margin-left:0;width:100%;">
            <button class="btn btn-primary" id="auth-submit" style="width:100%;justify-content:center;">${isSignUp ? "Create account" : "Sign in"}</button>
          </div>
        </div>
      </div>
    `;
  }

  const backdrop = el(`<div class="backdrop"></div>`);
  function mount() {
    const existing = backdrop.querySelector(".modal");
    if (existing) existing.remove();
    const modal = el(buildModal());
    backdrop.appendChild(modal);

    if (isLoggedIn) {
      modal.querySelector("#auth-cancel").addEventListener("click", close);
      modal.querySelector("#auth-logout").addEventListener("click", async () => {
        const prev = viewer;
        await signOut();
        if (prev) addLog("Signed out (was " + prev + ").");
        close(); signingIn = true; render();
      });
    } else {
      const emailInp = modal.querySelector("#auth-email");
      const passInp = modal.querySelector("#auth-pass");
      const nameInp = modal.querySelector("#auth-name");
      const errDiv = modal.querySelector("#auth-err");
      const submitBtn = modal.querySelector("#auth-submit");
      setTimeout(() => (nameInp || emailInp).focus(), 30);

      const submit = async () => {
        const email = emailInp.value.trim();
        const pass = passInp.value;
        const name = nameInp ? nameInp.value.trim() : "";
        if (!email || !pass) { errDiv.innerHTML = '<p class="auth-err">Please fill in all fields.</p>'; return; }
        if (isSignUp && pass.length < 6) { errDiv.innerHTML = '<p class="auth-err">Password must be at least 6 characters.</p>'; return; }
        submitBtn.textContent = "…";
        submitBtn.disabled = true;
        try {
          if (isSignUp) { await signUp(email, pass, name || email.split("@")[0]); }
          else { await signIn(email, pass); }
          addLog("Signed in as " + viewer + ".");
          close(); render();
        } catch(e) {
          errDiv.innerHTML = '<p class="auth-err">' + escapeHtml(e.message) + '</p>';
          submitBtn.textContent = isSignUp ? "Create account" : "Sign in";
          submitBtn.disabled = false;
        }
      };
      submitBtn.addEventListener("click", submit);
      passInp.addEventListener("keydown", e => { if (e.key === "Enter") submit(); });
      emailInp.addEventListener("keydown", e => { if (e.key === "Enter") passInp.focus(); });
      if (nameInp) nameInp.addEventListener("keydown", e => { if (e.key === "Enter") emailInp.focus(); });

      modal.querySelector("#tab-signin").addEventListener("click", () => { if (isSignUp) { isSignUp = false; mount(); } });
      modal.querySelector("#tab-signup").addEventListener("click", () => { if (!isSignUp) { isSignUp = true; mount(); } });
    }

    if (isLoggedIn) backdrop.addEventListener("click", e => { if (e.target === backdrop) close(); });
  }

  const close = () => { backdrop.remove(); signingIn = false; };
  document.body.appendChild(backdrop);
  mount();
}

function renderEditor(k){
  if (document.querySelector(".backdrop")) return;
  const e = data[k] || { parent:null, notes:"", time:"" };
  const draft = { parent: e.parent||"", time: e.time||"", notes: e.notes||"", unresolved: !!e.unresolved, assignee: e.assignee||"" };
  const hasEntry = !!data[k];

  const backdrop = el(`<div class="backdrop"></div>`);
  const modal = el(`
    <div class="modal" style="max-height:90vh;overflow-y:auto;">
      <h3>${prettyDate(k)}</h3>
      <label class="flabel">Who has the kids?</label>
      <div class="pick">
        ${[["","—"],["B","Bobby"],["A","Allie"],["BA","Both"],["TBD","TBD"]].map(([v,l])=>
          `<button class="pp ${draft.parent===v?"on":""} ${v?("p"+v.toLowerCase()):""}" data-v="${v}">${l}</button>`).join("")}
      </div>
      <label class="flabel">Pickup / dropoff time</label>
      <input class="inp" id="f-time" value="${escapeHtml(draft.time)}" placeholder="e.g. 3:15 PM, Morning, before dinner" />
      <label class="flabel">Notes</label>
      <textarea class="ta" id="f-notes" rows="2" placeholder="Anything worth remembering for this day…">${escapeHtml(draft.notes)}</textarea>
      <label class="checkrow"><input type="checkbox" id="f-unres" ${draft.unresolved?"checked":""}/> Mark as unresolved</label>
      <div id="f-assignee-row" style="${draft.unresolved ? "" : "display:none;"}margin-top:10px;">
        <label class="flabel">Needs decision from</label>
        <div class="pick">
          ${["","Bobby","Allie","Both"].map(v =>
            `<button class="pp assignee-pick ${draft.assignee===v?"on":""}" data-a="${v}">${v||"—"}</button>`).join("")}
        </div>
      </div>
      <div class="modal-actions">
        ${hasEntry?`<button class="btn btn-del" id="f-del">Delete</button>`:""}
        <div class="right">
          <button class="btn btn-ghost" id="f-cancel">Cancel</button>
          <button class="btn btn-primary" id="f-save">Save</button>
        </div>
      </div>
      <div class="chat-section">
        <p class="chat-label">Chat</p>
        <div class="chat-messages" id="chat-list">
          <span class="chat-empty">Loading…</span>
        </div>
        <div class="chat-input-row">
          <input class="inp" id="chat-inp" placeholder="Type a message…" />
          <button class="chat-send" id="chat-send">Send</button>
        </div>
      </div>
    </div>
  `);

  backdrop.appendChild(modal);
  document.body.appendChild(backdrop);

  // --- Parent picker ---
  modal.querySelectorAll(".pp:not(.assignee-pick)").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      draft.parent = btn.getAttribute("data-v");
      modal.querySelectorAll(".pp:not(.assignee-pick)").forEach(b=>{
        const v=b.getAttribute("data-v");
        b.classList.toggle("on", v===draft.parent);
      });
    });
  });

  // --- Assignee picker ---
  modal.querySelectorAll(".assignee-pick").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      draft.assignee = btn.getAttribute("data-a");
      modal.querySelectorAll(".assignee-pick").forEach(b=>{
        b.classList.toggle("on", b.getAttribute("data-a")===draft.assignee);
      });
    });
  });

  // --- Toggle assignee row with unresolved checkbox ---
  const unresCheck = modal.querySelector("#f-unres");
  const assigneeRow = modal.querySelector("#f-assignee-row");
  unresCheck.addEventListener("change", () => {
    assigneeRow.style.display = unresCheck.checked ? "" : "none";
    if (!unresCheck.checked) {
      draft.assignee = "";
      modal.querySelectorAll(".assignee-pick").forEach(b => b.classList.remove("on"));
    }
  });

  // --- Form actions ---
  const close = ()=>{ backdrop.remove(); editingKey=null; };
  backdrop.addEventListener("click", e=>{ if(e.target===backdrop) close(); });
  modal.querySelector("#f-cancel").addEventListener("click", close);
  modal.querySelector("#f-save").addEventListener("click", ()=>{
    draft.time = modal.querySelector("#f-time").value;
    draft.notes = modal.querySelector("#f-notes").value;
    draft.unresolved = modal.querySelector("#f-unres").checked;
    backdrop.remove();
    saveEntry(k, draft);
  });
  const del = modal.querySelector("#f-del");
  if (del) del.addEventListener("click", ()=>{ backdrop.remove(); deleteEntry(k); });

  // --- Chat ---
  const chatList = modal.querySelector("#chat-list");
  const chatInp = modal.querySelector("#chat-inp");
  const chatSendBtn = modal.querySelector("#chat-send");

  function renderMsg(msg) {
    const when = msg.created_at ? new Date(msg.created_at) : new Date();
    const timeStr = when.toLocaleDateString("en-US",{month:"short",day:"numeric"}) + " " +
                    when.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"});
    return el(`
      <div class="chat-msg">
        <div class="chat-msg-head">
          <span class="chat-msg-who">${escapeHtml(msg.user_name)}</span>
          <span class="chat-msg-when">${timeStr}</span>
        </div>
        <div class="chat-msg-text">${escapeHtml(msg.message)}</div>
      </div>
    `);
  }

  function renderChatList(msgs) {
    chatList.innerHTML = "";
    if (!msgs.length) {
      chatList.appendChild(el(`<span class="chat-empty">No messages yet.</span>`));
    } else {
      msgs.forEach(m => chatList.appendChild(renderMsg(m)));
      chatList.scrollTop = chatList.scrollHeight;
    }
  }

  let chatMessages = [];
  loadMessages(k).then(msgs => { chatMessages = msgs; renderChatList(msgs); });

  const doSend = async () => {
    const text = chatInp.value.trim();
    if (!text) return;
    chatInp.value = "";
    chatSendBtn.disabled = true;
    try {
      const msg = await sendMessage(k, text);
      chatMessages.push(msg);
      renderChatList(chatMessages);
      notifyPush("chat", text, k);
    } catch(e) {}
    chatSendBtn.disabled = false;
    chatInp.focus();
  };
  chatSendBtn.addEventListener("click", doSend);
  chatInp.addEventListener("keydown", e => { if (e.key === "Enter") doSend(); });
}

async function boot() {
  await refreshToken();
  if (!authUser) signingIn = true;
  // Register service worker and check existing push subscription
  await registerSW();
  if (pushSupported) {
    try { pushSubscription = await getPushSubscription(); } catch(e) {}
  }
  render();
  await loadFromRemote();
  if (authUser) await loadUnseenChats();
  render();   // re-render with activity panel data
  updateLastSeen();
  startRealtime();
}
boot();
</script>
</body>
